  {id:31,name:"VA Vocational Rehabilitation & Employment (Ch. 31)",states:["ALL"],trades:["ALL"],category:"Veterans",type:"Education Benefit",level:"Federal",agency:"VA / VR&E Service",act:"Vocational Rehabilitation and Employment (Chapter 31)",maxBenefit:null,benefitUnit:"Full training costs + monthly subsistence for disabled veteran",calcMax:15000,valueBasis:"per disabled veteran (est.)",url:"https://www.va.gov/careers-employment/vocational-rehabilitation/",urlLabel:"VA VR&E Program",eligibility:"Veterans with service-connected disability rating of 20%+. Employer offers OJT/apprenticeship.",howToApply:"Work with VA VR&E counselors to develop OJT plans; employer submits job description and training outline.",notes:"VA pays ALL training costs AND monthly subsistence allowance to the veteran. Zero cost to employer. Helmets to Hardhats is a referral source.",tags:["disability","veteran","VR&E","Chapter 31","subsistence","free training"]},

function App(){
  const[tab,setTab]=useState("programs");

  const[summOpen,setSummOpen]=useState(true);
  const[reqOpen,setReqOpen]=useState(true);

  const[hires,setHires]=useState(5);
  const[wage,setWage]=useState(22);

  const[weeks,setWeeks]=useState(8);
  const[wotcCat,setWotcCat]=useState(0);
  const[wotcPct,setWotcPct]=useState(40);
  const[ojt,setOjt]=useState(true);
  const[ojtP,setOjtP]=useState(50);
  const[iwt,setIwt]=useState(false);
  const[iwtC,setIwtC]=useState(2000);
  const[iwtP,setIwtP]=useState(50);
  const[appr,setAppr]=useState(true);
  const[stateC,setStateC]=useState(false);
  const[stateA,setStateA]=useState(2500);
  const[s127,setS127]=useState(false);
  const[s127A,setS127A]=useState(3000);
  const[txR,setTxR]=useState(25);

  const selectedLoc=useMemo(()=>SILA_LOCATIONS.find(l=>`${l.brand}|${l.state}`===loc),[loc]);
  const selectedState=selectedLoc?selectedLoc.state:null;
  const stateName=selectedState?STATE_NAMES[selectedState]:null;
  const stateLocations=useMemo(()=>selectedState?SILA_LOCATIONS.filter(l=>l.state===selectedState):[],[selectedState]);
  const totalStateEmp=stateLocations.reduce((a,l)=>a+(l.emp||0),0);

  const grouped=useMemo(()=>{
    const g={};
    SILA_LOCATIONS.forEach(l=>{if(!g[l.state])g[l.state]=[];g[l.state].push(l);});
    return g;
  },[]);

  const filterProg=p=>{
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()))||(p.notes||"").toLowerCase().includes(search.toLowerCase());
    const mt=trade==="ALL"||(trade==="Veterans"&&p.category==="Veterans")||(trade==="Education"&&p.category==="Education")||p.trades.includes(trade)||p.trades.includes("ALL");
    const mc=catF==="ALL"||p.category===catF;
    return ms&&mt&&mc;
  };

    const rank=p=>p.category==="Presidential"?0:p.category==="Veterans"?2:p.category==="Education"?3:1;
    return rank(a)-rank(b);
  }),[search,trade,catF]);
  const allFiltered=useMemo(()=>{
    if(selectedState) return [...statePrograms,...federalPrograms];
    return PROGRAMS.filter(filterProg).sort((a,b)=>{
      const rank=p=>p.category==="Presidential"?0:p.states.includes("ALL")?2:1;
      return rank(a)-rank(b);
    });

            <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:3,marginBottom:6}}>

              {isVet&&<span className="badge vet-pill">🎖 Veterans</span>}
              {isEdu&&<span className="badge" style={{background:"rgba(139,181,160,.14)",color:"#8BB5A0",border:"1px solid rgba(139,181,160,.3)"}}>🎓 Education</span>}
              {!isState&&!isEO&&<span className="badge fed-pill">{p.level}</span>}
            </div>
            <div style={{fontSize:"clamp(13px,2vw,15px)",fontWeight:600,color:"#F0E8D4",lineHeight:1.3,fontFamily:"'DM Sans',sans-serif"}}>{p.name}</div>
            <div style={{fontSize:11,color:"#3A5C6A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{p.agency}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,paddingLeft:8}}>
            {p.maxBenefit!=null&&typeof p.maxBenefit==="number"&&p.maxBenefit>100?(
              <>
                <div style={{fontSize:18,fontWeight:800,color:isEO?"#D4A832":isState?"#5BAA72":isVet?"#78B5D8":tc,fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>${p.maxBenefit.toLocaleString()}</div>
                <div style={{fontSize:10,color:"#2A4050",maxWidth:90,textAlign:"right",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3,marginTop:2}}>{p.benefitUnit}</div>
              </>
            ):p.maxBenefit===null?(
              <div style={{fontSize:11,color:"#4A6070",fontFamily:"'DM Sans',sans-serif",maxWidth:80,textAlign:"right",lineHeight:1.4}}>{p.benefitUnit}</div>
            ):(
              <>
                <div style={{fontSize:17,fontWeight:800,color:tc,fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>{p.maxBenefit}%</div>
                <div style={{fontSize:10,color:"#2A4050",maxWidth:90,textAlign:"right",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3,marginTop:2}}>{p.benefitUnit}</div>
              </>
            )}
            <div style={{color:"#D4A832",fontSize:10,marginTop:5,fontFamily:"'DM Sans',sans-serif"}}>{isOpen?"▲ close":"▼ details"}</div>
          </div>
        </div>
        {isOpen&&(
          <div style={{marginTop:13}} onClick={e=>e.stopPropagation()}>
            <hr className="divider"/>
            <div style={{display:"grid",gap:11}}>
              {p.act&&<div><div className="cn">Authorizing Legislation</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{p.act}</div></div>}
              <div><div className="cn">Eligibility</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.eligibility}</div></div>
              <div><div className="cn">How to Apply</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.howToApply}</div></div>
              <div style={{background:isEO?"rgba(232,160,32,.08)":"rgba(212,168,50,.07)",border:`1px solid ${isEO?"rgba(232,160,32,.22)":"rgba(212,168,50,.16)"}`,borderRadius:8,padding:"11px 14px"}}>
                <div className="cn" style={{color:isEO?"#D4A832":"#A08030",marginBottom:4}}>💡 Strategy Note</div>
                <div style={{fontSize:13,color:isEO?"#D4B870":"#C8BC80",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{p.notes}</div>
              </div>
              {p.url&&(
                <div>
                  <div className="cn" style={{marginBottom:6}}>Start the Process</div>
                  <a href={p.url} target="_blank" rel="noopener noreferrer" className="url-btn" onClick={e=>e.stopPropagation()}>
                    <span>🔗</span>{p.urlLabel||"Open Official Program Page"}<span style={{opacity:.6}}>↗</span>
                  </a>
                </div>
              )}
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                <div>
                  <div className="cn" style={{marginBottom:4}}>Applicable Trades</div>
                  {p.trades.map(t=><span key={t} className="badge" style={{background:"rgba(106,191,192,.11)",color:"#6ABFC0",border:"1px solid rgba(106,191,192,.22)"}}>{t}</span>)}
                </div>
                {p.calcMax>0&&(
                  <div>
                    <div className="cn" style={{marginBottom:4}}>Value for Summary</div>
                    <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:isState?"#5BAA72":"#C8A84B"}}>{fmtFull(p.calcMax)} <span style={{fontWeight:400,color:"#4A6070",fontSize:11}}>{p.valueBasis}</span></span>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  const SectionHeader=({icon,label,count,color,sub})=>(
    <div className="sec-header">
      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:color||"#D4A832",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:7}}>
        <span>{icon}</span>{label}
        <span style={{fontWeight:400,color:"#3A5060",fontSize:11}}>({count})</span>
      </div>
      {sub&&<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#3A5060",marginLeft:2,whiteSpace:"nowrap"}}>{sub}</div>}
      <div className="sec-header-line"/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0A1826 0%,#0E2038 55%,#08141E 100%)"}}>
      <style>{SS}</style>
      {/* HEADER */}
      <div style={{maxWidth:980,margin:"0 auto",padding:"22px 16px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:6}}>
          <div>
            <p style={{fontSize:11,letterSpacing:".17em",textTransform:"uppercase",color:"#D4A832",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>Sila Services · Learning &amp; Development</p>
            <h1 className="serif" style={{fontSize:"clamp(22px,4vw,33px)",color:"#F5EED8",letterSpacing:"-.01em",lineHeight:1.15}}>Training Incentives Navigator</h1>
            <p style={{color:"#4A6A7A",fontSize:13,marginTop:6,lineHeight:1.6,fontFamily:"'DM Sans',sans-serif"}}>Location-aware · Trades-focused · Veteran-ready · Pell-integrated</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:11,color:"#344A58",letterSpacing:".08em",marginBottom:2,fontFamily:"'DM Sans',sans-serif"}}>KNOWLEDGE BASE</div>
            <div style={{fontSize:30,fontWeight:800,color:"#D4A832",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{PROGRAMS.length}</div>
            <div style={{fontSize:11,color:"#344A58",fontFamily:"'DM Sans',sans-serif"}}>programs tracked</div>
            <div style={{marginTop:7,background:"rgba(212,168,50,.09)",border:"1.5px solid rgba(212,168,50,.28)",borderRadius:100,padding:"3px 11px",display:"inline-flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#5BAA72",display:"inline-block"}}/>
              <span style={{fontSize:11,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>Updated {KB_LAST_UPDATED}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid rgba(212,168,50,.14)",marginTop:18,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px 60px"}}>

        {/* ═══ PROGRAMS TAB ═══ */}
        {tab==="programs"&&(
          <div>
            {/* Location picker */}
            <div style={{background:"linear-gradient(135deg,rgba(212,168,50,.1),rgba(212,168,50,.03))",border:"1.5px solid rgba(212,168,50,.28)",borderRadius:13,padding:"18px 20px",marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:22}}>📍</span>
                <div>
                  <div style={{fontWeight:600,fontSize:14,color:"#F5EED8",fontFamily:"'DM Sans',sans-serif"}}>Select Your Work Location</div>
                  <div style={{fontSize:12,color:"#4A6A7A",fontFamily:"'DM Sans',sans-serif"}}>State programs surface automatically · Federal programs always shown below</div>
                </div>
              </div>
              <div style={{position:"relative"}}>
                <select className="loc-sel" value={loc} onChange={e=>setLoc(e.target.value)}>
                  <option value="">— All Locations (show all programs) —</option>
                  {Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).map(([st,locs])=>(
                    <optgroup key={st} label={`── ${STATE_NAMES[st]||st} (${st}) ──`}>
                      {locs.map(l=><option key={l.brand+l.state} value={`${l.brand}|${l.state}`}>{l.brand} — {l.city}{l.emp?` · ${l.emp} emp`:""}</option>)}
                    </optgroup>
                  ))}
                </select>
                <span style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",color:"#D4A832",pointerEvents:"none",fontSize:13}}>▾</span>
              </div>
              {selectedLoc&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(212,168,50,.15)",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:14,fontWeight:700,color:"#F5EED8",fontFamily:"'DM Sans',sans-serif"}}>{selectedLoc.brand}</span>
                    <span style={{fontSize:13,color:"#5A7A8A",marginLeft:8,fontFamily:"'DM Sans',sans-serif"}}>{selectedLoc.city}, {selectedLoc.state}</span>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {selectedLoc.specialty.map(s=><span key={s} className="badge" style={{background:"rgba(106,191,192,.12)",color:"#6ABFC0",border:"1px solid rgba(106,191,192,.25)"}}>{s}</span>)}
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span className="state-pill">{stateName} Programs Active</span>
                    {stateLocations.length>1&&<span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>{stateLocations.length} brands · {totalStateEmp>0?`${totalStateEmp}+`:""} employees in {selectedLoc.state}</span>}
                  </div>
                </div>
              )}
            </div>

            {/* Presidential EO banner */}
            <div style={{background:"linear-gradient(135deg,rgba(232,160,32,.13),rgba(180,110,20,.05))",border:"1.5px solid rgba(232,160,32,.42)",borderRadius:13,padding:"16px 18px",marginBottom:18,cursor:"pointer"}} onClick={()=>setEoOpen(!eoOpen)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <span className="badge eo-pill">⚡ Active Executive Order</span>
                    <span style={{fontSize:12,color:"#8A6018",fontFamily:"'DM Sans',sans-serif"}}>Signed April 23, 2025 · President Trump · Trades Priority</span>
                  </div>
                  <div className="serif" style={{fontSize:"clamp(14px,2.2vw,18px)",color:"#F5EED8",lineHeight:1.3}}>{PRESIDENTIAL_MANDATE.title}</div>
                  <div style={{fontSize:13,color:"#C8A040",marginTop:7,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>Goal: {PRESIDENTIAL_MANDATE.goal}</div>
                  {!eoOpen&&<div style={{fontSize:11,color:"#6A5020",marginTop:4,fontFamily:"'DM Sans',sans-serif"}}>Tap to see directives, Sila opportunity analysis &amp; what to watch →</div>}
                </div>
                <div style={{color:"#D4A832",fontSize:17,flexShrink:0}}>{eoOpen?"▲":"▼"}</div>
              </div>
              {eoOpen&&(
                <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid rgba(232,160,32,.2)"}} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:16,marginBottom:14}}>
                    <div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:8}}>KEY DIRECTIVES</div>
                      <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:7}}>
                        {PRESIDENTIAL_MANDATE.keyDirectives.map((d,i)=>(
                          <li key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                            <span style={{color:"#D4A832",fontSize:11,marginTop:3,flexShrink:0}}>→</span>
                            <span style={{fontSize:12,color:"#C0A058",lineHeight:1.65,fontFamily:"'DM Sans',sans-serif"}}>{d}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:6}}>OPPORTUNITY FOR SILA</div>
                      <div style={{fontSize:13,color:"#D4B870",lineHeight:1.7,marginBottom:14,fontFamily:"'DM Sans',sans-serif"}}>{PRESIDENTIAL_MANDATE.silaOpportunity}</div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:4}}>WATCH FOR</div>
                      <div style={{fontSize:12,color:"#A08040",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{PRESIDENTIAL_MANDATE.watchFor}</div>
                    </div>
                  </div>
                  <a href="https://www.whitehouse.gov/presidential-actions/2025/04/preparing-americans-for-high-paying-skilled-trade-jobs-of-the-future/" target="_blank" rel="noopener noreferrer" className="url-btn" style={{width:"fit-content"}} onClick={e=>e.stopPropagation()}>
                    <span>🔗</span>Read the Full Executive Order ↗
                  </a>
                </div>
              )}
            </div>

            {/* Filter row */}
            <div style={{marginBottom:13}}>
              <div className="scroll-x" style={{marginBottom:9}}>
                {TRADE_FILTERS.map(f=><button key={f.key} className={`tf-pill${trade===f.key?" on":""}`} onClick={()=>setTrade(f.key)}><span>{f.icon}</span>{f.label}</button>)}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 210px"}}><input className="srch" placeholder="Search programs, certifications, states, agencies…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
                <select className="fsel" value={catF} onChange={e=>setCatF(e.target.value)}>
                  <option value="ALL">All Categories</option>
                  {Object.entries(CAT_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>
            <div style={{fontSize:11,color:"#2A4050",marginBottom:11,fontFamily:"'DM Sans',sans-serif"}}>
              Showing {allFiltered.length} of {PROGRAMS.length} programs{selectedState?` · ${statePrograms.length} ${stateName} state + ${federalPrograms.length} federal`:""}
            </div>

            {/* Programs list — grouped when state selected */}
            {selectedState?(
              <>
                {statePrograms.length>0&&(
                  <>
                    <SectionHeader icon="📍" label={`${stateName} State Programs`} count={statePrograms.length} color="#5BAA72" sub={`Subtotal: ${fmt(stateTotal)}`}/>
                    {statePrograms.map(p=><ProgramCard key={p.id} p={p} isState={true}/>)}
                  </>
                )}
                {federalPrograms.length>0&&(
                  <>
                    <SectionHeader icon="🏛" label="Federal & National Programs" count={federalPrograms.length} color="#6B9EC7" sub={`Subtotal: ${fmt(fedTotal)}`}/>
                    {federalPrograms.map(p=><ProgramCard key={p.id} p={p} isState={false}/>)}
                  </>
                )}
              </>
            ):(
              allFiltered.map(p=><ProgramCard key={p.id} p={p} isState={false}/>)
            )}

            {allFiltered.length===0&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>
                <div style={{fontSize:28,marginBottom:10}}>🔍</div>
                <div style={{fontSize:14}}>No programs match your filters. Try broadening the trade type or clearing search.</div>
              </div>
            )}

            {/* ── FUNDING SUMMARY ── */}
            {selectedState&&(
              <div style={{marginTop:28,background:"rgba(212,168,50,.04)",border:"2px solid rgba(212,168,50,.25)",borderRadius:14,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",background:"rgba(212,168,50,.08)",cursor:"pointer",borderBottom:"1px solid rgba(212,168,50,.18)"}} onClick={()=>setSummOpen(!summOpen)}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:18}}>💰</span>
                    <div>
                      <div className="serif" style={{fontSize:17,color:"#D4A832"}}>Funding Summary — {stateName}</div>
                      <div style={{fontSize:12,color:"#7A8A9A",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>Maximum potential available if all applicable programs are pursued</div>
                    </div>
                  </div>
                  <div style={{color:"#D4A832",fontSize:18}}>{summOpen?"▲":"▼"}</div>
                </div>
                {summOpen&&(
                  <div style={{padding:"4px 0"}}>
                    {/* State programs */}
                    {statePrograms.length>0&&(
                      <>
                        <div style={{padding:"10px 18px 4px",display:"flex",alignItems:"center",gap:7}}>
                          <span className="state-pill" style={{fontSize:10}}>📍 {selectedState}</span>
                          <span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>State Programs</span>
                        </div>
                        {statePrograms.map(p=>(
                          <div key={p.id} className="sum-row">
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{p.name}</div>
                              <div style={{fontSize:10,color:"#3A5060",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>{p.valueBasis}</div>
                            </div>
                            <div style={{textAlign:"right",paddingLeft:12}}>
                              <div style={{fontWeight:700,color:"#5BAA72",fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>{fmt(p.calcMax)}</div>
                              {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#4A7A8A",fontFamily:"'DM Sans',sans-serif",textDecoration:"none"}} onClick={e=>e.stopPropagation()}>Start →</a>}
                            </div>
                          </div>
                        ))}
                        <div className="sum-sub" style={{background:"rgba(91,170,114,.1)",border:"1px solid rgba(91,170,114,.2)",margin:"4px 12px 8px"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#5BAA72",fontFamily:"'DM Sans',sans-serif"}}>📍 {stateName} State Subtotal</span>
                          <span style={{fontSize:18,fontWeight:900,color:"#5BAA72",fontFamily:"'DM Sans',sans-serif"}}>{fmt(stateTotal)}</span>
                        </div>
                      </>
                    )}
                    {/* Federal programs */}
                    {federalPrograms.length>0&&(
                      <>
                        <div style={{padding:"8px 18px 4px",display:"flex",alignItems:"center",gap:7}}>
                          <span className="badge fed-pill" style={{fontSize:10,margin:0}}>🏛 Federal</span>
                          <span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>& National Programs</span>
                        </div>
                        {federalPrograms.map(p=>(
                          <div key={p.id} className="sum-row">
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{p.name}</div>
                              <div style={{fontSize:10,color:"#3A5060",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>{p.valueBasis}</div>
                            </div>
                            <div style={{textAlign:"right",paddingLeft:12}}>
                              <div style={{fontWeight:700,color:p.calcMax>0?"#6B9EC7":"#3A5060",fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>{p.calcMax>0?fmt(p.calcMax):"—"}</div>
                              {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#4A7A8A",fontFamily:"'DM Sans',sans-serif",textDecoration:"none"}} onClick={e=>e.stopPropagation()}>Start →</a>}
                            </div>
                          </div>
                        ))}
                        <div className="sum-sub" style={{background:"rgba(107,158,199,.1)",border:"1px solid rgba(107,158,199,.2)",margin:"4px 12px 8px"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#6B9EC7",fontFamily:"'DM Sans',sans-serif"}}>🏛 Federal &amp; National Subtotal</span>
                          <span style={{fontSize:18,fontWeight:900,color:"#6B9EC7",fontFamily:"'DM Sans',sans-serif"}}>{fmt(fedTotal)}</span>
                        </div>
                      </>
                    )}
                    {/* Grand total */}
                    <div className="sum-total" style={{background:"linear-gradient(135deg,rgba(212,168,50,.15),rgba(212,168,50,.05))",borderTop:"2px solid rgba(212,168,50,.3)",margin:0}}>
                      <div>
                        <div className="serif" style={{fontSize:16,color:"#D4A832"}}>Total Potential Available</div>
                        <div style={{fontSize:11,color:"#7A8A70",fontFamily:"'DM Sans',sans-serif",marginTop:2}}>Theoretical maximum if all applicable programs are pursued · Values are per-program caps or typical maximums · Actual awards depend on eligibility</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,paddingLeft:16}}>
                        <div style={{fontSize:"clamp(24px,4vw,34px)",fontWeight:900,color:"#D4A832",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{fmt(grandTotal)}</div>
                        <div style={{fontSize:11,color:"#7A8A70",fontFamily:"'DM Sans',sans-serif"}}>State + Federal</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── REQUIREMENTS & NEXT STEPS ── */}
            <div style={{marginTop:20,border:"1.5px solid rgba(212,168,50,.18)",borderRadius:14,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",background:"rgba(212,168,50,.06)",cursor:"pointer",borderBottom:reqOpen?"1px solid rgba(212,168,50,.14)":"none"}} onClick={()=>setReqOpen(!reqOpen)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>📋</span>
                  <div>
                    <div className="serif" style={{fontSize:17,color:"#D4A832"}}>Requirements &amp; What To Do Next</div>
                    <div style={{fontSize:12,color:"#7A8A9A",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>Common eligibility requirements · Prioritized action sequence</div>
                  </div>
                </div>
                <div style={{color:"#D4A832",fontSize:18}}>{reqOpen?"▲":"▼"}</div>
              </div>
              {reqOpen&&(
                <div style={{padding:"18px 18px 4px"}}>
                  {/* Requirements */}
                  <div className="cn" style={{marginBottom:11}}>COMMON ELIGIBILITY REQUIREMENTS (ACROSS MOST PROGRAMS)</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:8,marginBottom:20}}>
                    {BASIC_REQUIREMENTS.map((r,i)=>(
                      <div key={i} className="req-row">
                        <span style={{fontSize:20,flexShrink:0}}>{r.icon}</span>
                        <div>
                          <div style={{fontSize:13,fontWeight:600,color:"#E0D8C8",fontFamily:"'DM Sans',sans-serif",marginBottom:2}}>{r.req}</div>
                          <div style={{fontSize:11,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{r.detail}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  {/* Next Steps */}
                  <div className="cn" style={{marginBottom:11}}>YOUR PRIORITIZED ACTION SEQUENCE{selectedState?` — ${stateName.toUpperCase()}`:""}</div>
                  {NEXT_STEPS.map((s,i)=>(
                    <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="ns-row" style={{borderColor:i===0?"rgba(212,168,50,.35)":i<2?"rgba(91,170,114,.25)":"rgba(255,255,255,.07)"}}>
                      <div style={{width:32,height:32,borderRadius:"50%",background:i===0?"rgba(212,168,50,.2)":i<2?"rgba(91,170,114,.15)":"rgba(107,158,199,.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:13,color:i===0?"#D4A832":i<2?"#5BAA72":"#6B9EC7"}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#E0D8C8",fontFamily:"'DM Sans',sans-serif"}}>{s.action}</span>
                          <span className="badge" style={{background:s.priority==="This Week"?"rgba(212,168,50,.15)":s.priority==="This Month"?"rgba(91,170,114,.12)":"rgba(107,158,199,.1)",color:s.priority==="This Week"?"#D4A832":s.priority==="This Month"?"#5BAA72":"#6B9EC7",border:"none",margin:0,fontSize:9}}>{s.priority}</span>
                        </div>
                        <div style={{fontSize:12,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{s.detail}</div>
                        <div style={{fontSize:10,color:"#4A6A7A",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>🔗 {s.url.replace("https://","")}</div>
                      </div>
                      <div style={{color:"#4A6A7A",fontSize:14,flexShrink:0,alignSelf:"center"}}>↗</div>
                    </a>
                  ))}
                  <div style={{paddingBottom:18}}/>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ═══ CALCULATOR ═══ */}
        {tab==="calculator"&&(
          <div>
            {selectedLoc?<div style={{background:"rgba(91,170,114,.08)",border:"1.5px solid rgba(91,170,114,.25)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>📍</span><span style={{fontSize:13,color:"#8BB5A0",fontFamily:"'DM Sans',sans-serif"}}>Calculating for <strong style={{color:"#F0E8D4"}}>{selectedLoc.brand}</strong> — {selectedLoc.city}, {selectedLoc.state}</span></div>:<div style={{background:"rgba(212,168,50,.06)",border:"1.5px solid rgba(212,168,50,.2)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}><span>💡</span><span style={{fontSize:13,color:"#C0A870",fontFamily:"'DM Sans',sans-serif"}}>Select a location on the Programs tab for state-specific credit suggestions.</span></div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:20}}>
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Hire Parameters</h2>
                <div className="crd">
                  <div style={{display:"grid",gap:12}}>
                    <div><div className="cn">Number of New Hires</div><input type="number" className="ci" value={hires} min={1} onChange={e=>setHires(Math.max(1,parseInt(e.target.value)||1))}/></div>
                    <div><div className="cn">Starting Hourly Wage ($)</div><input type="number" className="ci" value={wage} min={7.25} step={0.25} onChange={e=>setWage(parseFloat(e.target.value)||15)}/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div><div className="cn">Hours/Week</div><input type="number" className="ci" value={hrs} min={1} max={60} onChange={e=>setHrs(parseInt(e.target.value)||40)}/></div>
                      <div><div className="cn">Training Weeks</div><input type="number" className="ci" value={weeks} min={1} onChange={e=>setWeeks(parseInt(e.target.value)||8)}/></div>
                    </div>
                    <div><div className="cn">Corp. Tax Rate (%)</div><input type="number" className="ci" value={txR} min={1} max={50} onChange={e=>setTxR(parseInt(e.target.value)||25)}/></div>
                  </div>
                  <div style={{fontSize:11,color:"#2A4050",marginTop:9,fontFamily:"'DM Sans',sans-serif"}}>1st-yr wage: ${(wage*hrs*52).toLocaleString()} · Training wages: ${(wage*hrs*weeks).toLocaleString()}</div>
                </div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>WOTC Tax Credit</h2>
                <div className="crd">
                  <div style={{marginBottom:11}}><div className="cn">Employee Category</div>
                    <select className="csel" value={wotcCat} onChange={e=>setWotcCat(parseInt(e.target.value))}>
                      {WOTC_CATEGORIES.map((c,i)=><option key={i} value={i}>{c.label} (max ${c.maxCredit.toLocaleString()})</option>)}
                    </select>
                  </div>
                  <div><div className="cn">% of Hires in This WOTC Category</div><input type="number" className="ci" value={wotcPct} min={0} max={100} onChange={e=>setWotcPct(parseInt(e.target.value)||0)}/></div>
                </div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Programs to Stack</h2>
                <div className="crd">
                  {[
                    {on:ojt,set:setOjt,label:"OJT Wage Reimbursement (WIOA)",sub:"50–75% of training wages",extra:ojt&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Reimbursement %</div><input type="number" className="ci" value={ojtP} min={0} max={75} onChange={e=>setOjtP(parseInt(e.target.value)||50)}/></div>},
                    {on:iwt,set:setIwt,label:"Incumbent Worker Training Grant",sub:"Upskill existing technicians",extra:iwt&&<div style={{paddingLeft:52,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}><div><div className="cn">Cost/Employee ($)</div><input type="number" className="ci" value={iwtC} onChange={e=>setIwtC(parseInt(e.target.value)||0)}/></div><div><div className="cn">Reimbursement %</div><input type="number" className="ci" value={iwtP} min={0} max={90} onChange={e=>setIwtP(parseInt(e.target.value)||50)}/></div></div>},
                    {on:appr,set:setAppr,label:"Registered Apprenticeship Grant",sub:"~$2,000/apprentice federal base"},
                    {on:stateC,set:setStateC,label:`State Apprenticeship Credit${selectedState?" ("+selectedState+")":""}`,sub:"Enter your state credit below",extra:stateC&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">State Credit per Apprentice ($)</div><input type="number" className="ci" value={stateA} onChange={e=>setStateA(parseInt(e.target.value)||0)}/><div style={{fontSize:11,color:"#2A4050",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>PA: $2,500 · NY: $5,000 · NJ: $5,000 · IL: $2,500 · OH: $2,000+</div></div>},
                    {on:s127,set:setS127,label:"§127 Educational Assistance",sub:"Tax-free certs/tuition up to $5,250/yr",extra:s127&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Annual Benefit/Employee (max $5,250)</div><input type="number" className="ci" value={s127A} min={0} max={5250} onChange={e=>setS127A(Math.min(5250,parseInt(e.target.value)||0))}/></div>}
                  ].map(({on,set,label,sub,extra},i)=>(
                    <div key={i} style={{marginBottom:extra?0:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:6}}>
                        <button className={`tgl ${on?"on":"off"}`} onClick={()=>set(!on)}/>
                        <div><div style={{fontSize:13,fontWeight:600,color:"#D0D8E0",fontFamily:"'DM Sans',sans-serif"}}>{label}</div><div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{sub}</div></div>
                      </div>
                      {extra}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Estimated Savings</h2>
                <div style={{background:"linear-gradient(135deg,rgba(212,168,50,.18),rgba(212,168,50,.06))",border:"2.5px solid #D4A832",borderRadius:15,padding:"24px 20px",textAlign:"center",marginBottom:15}}>
                  <div className="cn" style={{marginBottom:7}}>Total Estimated Offset</div>
                  <div style={{fontSize:"clamp(38px,7vw,56px)",fontWeight:900,color:"#D4A832",letterSpacing:"-.02em",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{fmt(total)}</div>
                  <div style={{fontSize:12,color:"#5A7A8A",marginTop:6,fontFamily:"'DM Sans',sans-serif"}}>across {hires} hire{hires!==1?"s":""}</div>
                  {hires>0&&<div style={{fontSize:16,color:"#C0D0DC",marginTop:8,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{fmt(total/hires)} avg per hire</div>}
                </div>
                <div className="crd">
                  <div className="cn" style={{marginBottom:11}}>Breakdown</div>
                  {[
                    {l:"WOTC Tax Credit",sub:`${wotcPct}% · ${WOTC_CATEGORIES[wotcCat].label.split("(")[0].trim()}`,v:wotcV,c:"#D4A832",url:"https://www.dol.gov/agencies/eta/wotc"},
                    ojt?{l:"OJT Wage Reimbursement",sub:`${ojtP}% × ${weeks} wks × ${hires}`,v:ojtV,c:"#6B9EC7",url:"https://www.careeronestop.org/BusinessCenter/TrainAndRetain/FundingEmployeeTraining/state-and-federal-grants.aspx"}:null,
                    iwt?{l:"Incumbent Worker Training",sub:`${iwtP}% of $${iwtC.toLocaleString()} × ${hires}`,v:iwtV,c:"#A07CC5",url:"https://www.careeronestop.org/BusinessCenter/TrainAndRetain/FundingEmployeeTraining/state-and-federal-grants.aspx"}:null,
                    appr?{l:"Apprenticeship Grant (base)",sub:`$2,000 × ${hires}`,v:apprV,c:"#5BAA72",url:"https://www.apprenticeship.gov/employers/registered-apprenticeship-program"}:null,
                    stateC?{l:`State Credit${selectedState?" ("+selectedState+")":""}`,sub:`$${stateA.toLocaleString()} × ${hires}`,v:stateV,c:"#5BAA72",url:"https://www.careeronestop.org/BusinessCenter/TrainAndRetain/FundingEmployeeTraining/state-and-federal-grants.aspx"}:null,
                    s127?{l:"§127 Tax Savings",sub:`${txR}% rate × $${Math.min(s127A,5250).toLocaleString()} × ${hires}`,v:s127V,c:"#8BB5A0",url:"https://www.irs.gov/publications/p15-b"}:null
                  ].filter(Boolean).map((r,i)=>(
                    <div key={i} className="rr">
                      <div>
                        <div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif"}}>{r.l}</div>
                        <div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{r.sub}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontWeight:800,color:r.c,fontSize:15,fontFamily:"'DM Sans',sans-serif"}}>{fmt(r.v)}</div>
                        {r.url&&<a href={r.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#4A6A7A",textDecoration:"none",border:"1px solid rgba(107,158,199,.2)",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>Apply →</a>}
                      </div>
                    </div>
                  ))}
                  <div style={{borderTop:"2px solid rgba(212,168,50,.22)",marginTop:5,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:600,fontSize:14,color:"#E2D9C5",fontFamily:"'DM Sans',sans-serif"}}>Total</div>
                    <div style={{fontSize:24,fontWeight:900,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>{fmt(total)}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                  {[{l:"Gross 1st-Yr",v:fmt(wage*hrs*52),c:"#C07A5A"},{l:"Offset/Hire",v:fmt(total/Math.max(hires,1)),c:"#5BAA72"},{l:"Net 1st-Yr",v:fmt(Math.max(0,(wage*hrs*52)-total/Math.max(hires,1))),c:"#6B9EC7"}].map(x=>(
                    <div key={x.l} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(212,168,50,.1)",borderRadius:9,padding:"11px 8px",textAlign:"center"}}>
                      <div className="cn" style={{fontSize:9}}>{x.l}</div>
                      <div style={{fontSize:14,fontWeight:800,color:x.c,fontFamily:"'DM Sans',sans-serif"}}>{x.v}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(120,181,216,.07)",border:"1.5px solid rgba(120,181,216,.2)",borderRadius:9,padding:14,marginBottom:11}}>
                  <div className="cn" style={{color:"#78B5D8",marginBottom:5}}>🎖 GI Bill / SkillBridge (not in calculator)</div>
                  <div style={{fontSize:12,color:"#6A8AA0",lineHeight:1.75,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
                    <strong style={{color:"#C0D0DC"}}>GI Bill Apprentice:</strong> VA pays $1,800–$2,717/mo to veteran — ON TOP of Sila wage. Employer cost: $0.<br/>
                    <strong style={{color:"#C0D0DC"}}>SkillBridge:</strong> DOD pays active-duty member's full salary for 4-6 months. Employer cost: <strong style={{color:"#5BAA72"}}>$0</strong>.
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <a href="https://www.va.gov/education/about-gi-bill-benefits/how-to-use-benefits/on-the-job-training-apprenticeships/" target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>GI Bill Employer Approval ↗</a>
                    <a href="https://skillbridge.defense.gov/Employers/Enrollment-Process.htm" target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>SkillBridge Register ↗</a>
                  </div>
                </div>
                <div style={{background:"rgba(91,170,114,.06)",border:"1.5px solid rgba(91,170,114,.18)",borderRadius:9,padding:12}}>
                  <div style={{fontSize:11,color:"#5A7A6A",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}><strong style={{color:"#5BAA72"}}>⚠ Planning Estimate Only.</strong> Actual benefits depend on eligibility, state-specific rules, and program availability. Verify with a workforce development specialist or CPA.</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ═══ LEGISLATION ═══ */}
        {tab==="acts"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Federal legislation and executive orders authorizing workforce training incentives for trades employers.</p>
            {ACTS.map((a,i)=>(
              <div key={i} className="act-card" style={{borderLeft:`3.5px solid ${a.highlight?"#E8A020":"#D4A832"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:600,color:"#F0E8D4",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#2A4050",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{typeof a.year==="number"?`Enacted ${a.year}`:`Updated ${a.year}`} · {a.agency}</div>
                  </div>
                  {a.highlight?<span className="badge eo-pill">⚡ Active Priority</span>:<span className="badge" style={{background:"rgba(212,168,50,.1)",color:"#D4A832",border:"1px solid rgba(212,168,50,.25)",height:"fit-content"}}>{a.year}</span>}
                </div>
                <div style={{fontSize:13,color:"#7A9AB0",lineHeight:1.72,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>{a.scope}</div>
                {a.url&&<a href={a.url} target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 11px"}}>🔗 Official Source ↗</a>}
              </div>
            ))}
          </div>
        )}

        {/* ═══ AGENCIES ═══ */}
        {tab==="agencies"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Federal, state, and industry agencies administering training incentives. Each is a potential partner, funder, or compliance authority.</p>
            {AGENCIES.map((a,i)=>(
              <div key={i} className="ag-card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:7}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"#F0E8D4",fontFamily:"'DM Sans',sans-serif"}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#D4A832",marginTop:1,fontFamily:"'DM Sans',sans-serif"}}>{a.dept}</div>
                  </div>
                  <a href={a.url} target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>🔗 {a.url.replace("https://","").split("/")[0]} ↗</a>
                </div>
                <div style={{fontSize:13,color:"#6A8AAA",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{a.role}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"13px 16px 26px",borderTop:"1px solid rgba(212,168,50,.08)"}}>
        <div style={{fontSize:10,color:"#1A2E3A",letterSpacing:".08em",fontFamily:"'DM Sans',sans-serif"}}>SILA SERVICES · L&amp;D TRAINING INCENTIVES NAVIGATOR · {KB_LAST_UPDATED} · CONFIDENTIAL — INTERNAL USE ONLY</div>
        <div style={{fontSize:10,color:"#1A2E3A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{SILA_LOCATIONS.length} brands · 15 states · {PROGRAMS.length} programs · Goldman Sachs Alternatives PE</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>

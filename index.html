  {id:100,name:"Registered Apprenticeship — EO Priority (Fast-Track)",states:["ALL"],trades:["ALL"],category:"Presidential",type:"Grant + Expedited Access",level:"Federal",agency:"DOL Office of Apprenticeship",act:"Exec. Order 'Preparing Americans for High-Paying Skilled Trade Jobs' (Apr 23, 2025)",maxBenefit:7000,benefitUnit:"per apprentice (combined credits)",eligibility:"All employers. Trades are explicit priority sectors under the EO. Processing times reduced under EO directive.",howToApply:"Register at apprenticeship.gov — streamlined under EO mandate. Partner with local American Job Center to fast-track. File for state apprenticeship credit simultaneously.",notes:"🔥 HIGHEST PRIORITY ACTION NOW: The Trump EO explicitly targets HVAC, Plumbing, and Electrical for apprenticeship expansion. Registering positions Sila brands to capture expanded federal grants as the 120-day plan rolls out, IRA bonus credits, and any new congressional tax incentives. The administration has stated trades are 'one of the few areas where this administration says we want more of this.'",tags:["presidential","EO","apprenticeship","trades","priority"]},

  {id:1,name:"Work Opportunity Tax Credit (WOTC)",states:["ALL"],trades:["ALL"],category:"Federal-Tax",type:"Tax Credit",level:"Federal",agency:"IRS / Department of Labor",act:"Consolidated Appropriations Act (extended through 2025)",maxBenefit:9600,benefitUnit:"per hire",eligibility:"Employers hiring from 10 target groups: veterans, SNAP recipients, ex-felons, vocational rehab referrals, summer youth, SSI recipients, long-term unemployed (27+ weeks), community residents, TANF recipients",howToApply:"File IRS Form 8850 within 28 days of employee start date; submit to State Workforce Agency (SWA). Deadline is critical — missing it forfeits the credit permanently.",notes:"40% of first $6,000 wages for most categories. Up to $9,600 for certain veterans. Stack with OJT reimbursement. Trade apprentices from target groups generate BOTH WOTC AND apprenticeship grants simultaneously.",tags:["WOTC","tax credit","hiring","veteran","reentry","SNAP"]},

  {id:3,name:"IRA Clean Energy Apprenticeship Bonus Credits",states:["ALL"],trades:["HVAC","Electrical"],category:"Federal-Tax",type:"Tax Incentive Bonus",level:"Federal",agency:"IRS / DOE",act:"Inflation Reduction Act (2022) §§48C, 45V, 48E",maxBenefit:null,benefitUnit:"10% bonus on clean energy credits for prevailing wage + apprenticeship",eligibility:"HVAC and electrical employers installing qualifying clean energy systems (heat pumps, mini-splits, EV chargers). Prevailing wage + registered apprenticeship compliance required for bonus tier.",howToApply:"Ensure DOL-registered apprenticeship is in place before work commences; maintain prevailing wage records; claim bonus on applicable IRS forms",notes:"Heat pump and mini-split HVAC installers are directly in scope. Dave's World (ME, 130 employees, specializes in heat pumps) is ideally positioned. Bonus is a % of underlying credit — significant on large residential/commercial projects.",tags:["IRA","heat pump","HVAC","clean energy","Dave's World","bonus"]},
  {id:4,name:"R&E Credit — Training Technology & Curriculum",states:["ALL"],trades:["Technology"],category:"Federal-Tax",type:"Tax Credit",level:"Federal",agency:"IRS",act:"IRC §41",maxBenefit:null,benefitUnit:"20% of qualified research wages above base",eligibility:"Employers developing new training methodologies, proprietary curricula, LMS platforms, or diagnostic assessment systems",howToApply:"File IRS Form 6765; document qualified research activities and related wages",notes:"Sila University curriculum development, ServiceTitan / field technology training programs, and novel diagnostic training approaches can qualify. Often overlooked — work with a tax advisor specializing in this credit.",tags:["R&D","curriculum","Sila University","LMS","technology"]},
  // FEDERAL GRANTS
  {id:10,name:"On-the-Job Training (OJT) — WIOA Title I",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Federal-Wage",type:"Wage Reimbursement",level:"Federal",agency:"DOL / Local Workforce Development Boards",act:"Workforce Innovation and Opportunity Act (WIOA) 2014",maxBenefit:75,benefitUnit:"% of wages reimbursed during training",eligibility:"Employers hiring WIOA-eligible workers: dislocated workers, low-income adults, youth 14-24. Employer must commit to permanent placement.",howToApply:"Contact local American Job Center or WDB BEFORE hiring; execute OJT agreement first, then hire. Retroactive claims are not permitted.",notes:"50-75% of trade apprentice wages reimbursed during training (typically 3-6 months). New HVAC technician at $22/hr for 16 weeks = ~$5,632 reimbursed at 50%. Stackable with WOTC and apprenticeship grants.",tags:["OJT","wage reimbursement","WIOA","new hire","trades","WDB"]},
  {id:11,name:"Incumbent Worker Training (IWT) — WIOA Title I",states:["ALL"],trades:["ALL"],category:"Federal-Wage",type:"Grant",level:"Federal / State",agency:"State Workforce Agencies / WDBs",act:"Workforce Innovation and Opportunity Act (WIOA)",maxBenefit:50,benefitUnit:"% of training costs (no new hire required)",eligibility:"Existing employees being upskilled to prevent layoffs or advance wages. No income limit on employees. Employer match required (10-50% based on size).",howToApply:"Apply through local Workforce Development Board with a training plan and cost breakdown before training begins",notes:"Covers NATE certifications, EPA 608, OSHA 10/30, ServiceTitan, advanced trade skills, technology upskilling. Ask your WDB about multi-employer IWT grants — multiple smaller Sila brands can apply jointly.",tags:["incumbent","upskill","current employees","NATE","EPA 608","OSHA","ServiceTitan"]},
  {id:12,name:"Federal Bonding Program",states:["ALL"],trades:["ALL"],category:"Federal-Grant",type:"Benefit-in-Kind",level:"Federal",agency:"DOL ETA",act:"WIOA",maxBenefit:25000,benefitUnit:"free fidelity bond coverage per hire",eligibility:"Employers hiring at-risk individuals: ex-offenders, recovering addicts, homeless individuals, economically disadvantaged youth",howToApply:"Contact State Bonding Coordinator via American Job Center; free, minimal paperwork",notes:"Removes a significant trades hiring barrier. Ex-offenders and at-risk workers are strong apprenticeship candidates but bond requirements often disqualify them. This program eliminates that risk at zero cost to employer.",tags:["bonding","reentry","ex-offender","at-risk","hiring"]},

  {id:30,name:"Post-9/11 GI Bill (Ch. 33) — OJT & Apprenticeship",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Veterans",type:"Education Benefit",level:"Federal",agency:"VA / Department of Veterans Affairs",act:"Post-9/11 Veterans Educational Assistance Act (Chapter 33)",maxBenefit:2717,benefitUnit:"monthly housing allowance paid by VA to veteran apprentice",eligibility:"Veterans with 90+ days active service after 9/10/2001. Employer must have VA-approved OJT/apprenticeship program.",howToApply:"Employer: VA-approve your apprenticeship at va.gov/education. Veteran: apply for benefits at va.gov. Both steps required — takes 4-6 weeks to set up.",notes:"VA pays a Monthly Housing Allowance ($1,800-$2,717/month, varies by zip code) PLUS $83/month book stipend DIRECTLY TO THE VETERAN during their apprenticeship — on top of their Sila wage. Employer pays NOTHING extra. This is the most powerful veteran recruiting tool available in trades.",tags:["GI Bill","Post-9/11","veteran","Chapter 33","housing allowance","apprenticeship"]},
  {id:31,name:"VA Vocational Rehabilitation & Employment (Ch. 31)",states:["ALL"],trades:["ALL"],category:"Veterans",type:"Education Benefit",level:"Federal",agency:"VA / VR&E Service",act:"Vocational Rehabilitation and Employment (Chapter 31)",maxBenefit:null,benefitUnit:"Full training costs + monthly subsistence allowance for disabled veteran",eligibility:"Veterans with service-connected disability rating of 20%+ (or 10%+ with serious employment handicap). Employer offers OJT/apprenticeship.",howToApply:"Work with VA VR&E counselors to develop OJT plans; employer submits job description and training outline",notes:"VA pays ALL training costs AND provides monthly subsistence allowance to the veteran. For disabled veterans entering trades, this is the richest benefit. Helmets to Hardhats is a good referral source for VR&E-eligible candidates.",tags:["disability","veteran","VR&E","Chapter 31","subsistence","free training"]},
  {id:32,name:"DOD SkillBridge — Active Duty to Trades",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Veterans",type:"Free Labor Pipeline",level:"Federal",agency:"Department of Defense",act:"National Defense Authorization Act (NDAA)",maxBenefit:null,benefitUnit:"DOD pays full military salary — employer cost is $0",eligibility:"Active duty service members within 180 days of separation. Employer provides internship/apprenticeship lasting 4-6 months.",howToApply:"Register as SkillBridge employer partner at skillbridge.defense.gov; post opportunities; receive pre-screened candidates",notes:"DOD pays their full military salary for 4-6 months while they apprentice at Sila — employer labor cost is ZERO. Motivated, disciplined, technically trained candidates. Navy/Air Force mechanical MOSs map directly to HVAC/electrical. Many SkillBridge participants convert to full-time hires. This may be the most underused program in home services.",tags:["SkillBridge","active duty","free labor","military","pipeline","transition","zero cost"]},
  {id:33,name:"Helmets to Hardhats",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Veterans",type:"Recruitment Pipeline",level:"Non-Profit / Federal Partner",agency:"Center for Military Recruitment / DOL Partner",act:"DOL-supported",maxBenefit:null,benefitUnit:"Zero-cost pre-screened veteran apprenticeship candidates",eligibility:"Employers with DOL-registered apprenticeship programs in trades",howToApply:"Register at helmetstohardhats.org; post apprenticeship slots; access veteran candidate database",notes:"Direct pipeline from military service to trades apprenticeship. Sila brands that register apprenticeship programs can post slots and receive pre-screened veteran candidates. Navy/Air Force mechanical backgrounds translate directly to HVAC and electrical work.",tags:["Helmets to Hardhats","veteran","trades","military","pipeline","recruitment"]},
  // EDUCATION
  {id:40,name:"Federal Pell Grant — CTE & Short-Term Workforce Programs",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Education",type:"Student Grant",level:"Federal",agency:"Dept. of Education / FAFSA",act:"Higher Education Act; FAFSA Simplification Act 2023 (short-term Pell extension)",maxBenefit:7395,benefitUnit:"per student per year (2025-26 award year)",eligibility:"Students with demonstrated financial need enrolled in eligible CTE programs. Recent expansion: Pell now available for programs as short as 8 weeks. Community college HVAC/plumbing/electrical programs qualify.",howToApply:"Partner with local community college for RTI delivery. Students apply at studentaid.gov (FAFSA). Under Trump EO, Pell expansion for CTE/trades is an explicit lever for reaching 1 million apprentices.",notes:"Strategic: partner with a local community college to deliver apprenticeship RTI. Apprentices then apply for Pell Grants that pay their tuition — both employer and employee benefit. Pell + community college = near-zero cost apprenticeship RTI infrastructure.",tags:["Pell Grant","CTE","community college","RTI","tuition","financial aid"]},
  {id:41,name:"Carl D. Perkins CTE Act — Employer Partnership",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Education",type:"Grant (via Institution Partnership)",level:"Federal",agency:"Dept. of Education / State CTE Agencies",act:"Carl D. Perkins Career and Technical Education Act (reauthorized 2018)",maxBenefit:null,benefitUnit:"Equipment, curriculum, instructor costs covered by institution",eligibility:"Employers partnering with secondary or postsecondary CTE programs. HVAC, Plumbing, Electrical are explicitly listed priority CTE occupations.",howToApply:"Contact local community/technical college CTE director; propose employer advisory partnership or articulation agreement",notes:"Perkins funds can pay for HVAC training equipment at a community college that Sila apprentices use — effectively giving Sila training infrastructure without capital investment. Funds curriculum development and instructor salaries. Essential for sustainable RTI.",tags:["Perkins","CTE","community college","equipment","curriculum","partnership"]},
  {id:42,name:"Trade Adjustment Assistance (TAA) — Displaced Worker Pipeline",states:["ALL"],trades:["ALL"],category:"Education",type:"Training Grant (Worker-Directed)",level:"Federal",agency:"DOL ETA",act:"Trade Adjustment Assistance Reauthorization Act",maxBenefit:null,benefitUnit:"100% of approved training costs + weekly income support for 2 years",eligibility:"Workers displaced due to trade-related job loss. HVAC, Plumbing, and Electrical are approved retraining occupations in most states.",howToApply:"Displaced workers petition through state workforce agency; employer can flag TAA-eligible candidates during recruiting",notes:"TAA participants have 100% training costs covered PLUS weekly Trade Readjustment Allowances (income replacement). A worker displaced from manufacturing retraining into HVAC via Sila apprenticeship = zero cost to employer, zero cost to worker.",tags:["TAA","displaced workers","manufacturing","pipeline","retraining","100% coverage"]},
  // TRADES-SPECIFIC
  {id:20,name:"NCCER Craft Training Credentials",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Trades",type:"Certification + Grant Access",level:"Industry",agency:"NCCER (National Center for Construction Education and Research)",act:"DOL Office of Apprenticeship partner",maxBenefit:null,benefitUnit:"Nationally portable credentials; accelerated DOL apprenticeship registration",eligibility:"Any employer sponsoring NCCER-accredited training. HVAC, Plumbing, Electrical modules all available.",howToApply:"Become a Sponsoring Organization at nccer.org; access curriculum and assessments",notes:"NCCER credentials are the gold standard for trade skills verification. Using NCCER as apprenticeship curriculum foundation makes federal registration faster, qualifies for Pell-eligible community college programs, and creates portable credentials valuable to technicians. Sila University could become NCCER-accredited.",tags:["NCCER","credential","trades","curriculum","portable","Sila University"]},
  {id:21,name:"PHCC Educational Foundation — Plumbing & HVAC Scholarships",states:["ALL"],trades:["Plumbing","HVAC"],category:"Trades",type:"Scholarship / Grant",level:"Industry / Private",agency:"PHCC Educational Foundation",act:"Industry Foundation",maxBenefit:5000,benefitUnit:"per student per year",eligibility:"Students in plumbing/HVAC programs; employer sponsorship prioritized",howToApply:"Apply at phccfoundation.org; employer-sponsored candidates prioritized; apply by March annually",notes:"Directly relevant to Sila's core trades. Employer-sponsored candidates get priority. Can fund apprentices' RTI costs, reducing employer's out-of-pocket for the apprenticeship program.",tags:["PHCC","plumbing","HVAC","scholarship","RTI","apprenticeship"]},
  {id:22,name:"DOD SkillBridge / Home Builders Institute (HBI) Pipeline",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Trades",type:"Training Partnership + Pipeline",level:"Federal / Private",agency:"Home Builders Institute",act:"DOL + HUD-supported",maxBenefit:null,benefitUnit:"Pre-trained candidates, zero training cost to employer",eligibility:"At-risk youth, veterans, justice-involved individuals entering trades. Employers partner to hire graduates.",howToApply:"Partner with HBI at hbi.org; commit to interview/hire pipeline graduates; no cost to employer",notes:"HBI runs pre-apprenticeship programs in trades across multiple states. Partnering creates a zero-cost pipeline of HVAC/plumbing/electrical candidates pre-trained to basic proficiency. Many HBI graduates also qualify for WOTC (target group workers).",tags:["HBI","pipeline","pre-apprenticeship","at-risk","trades","zero cost"]},
  {id:23,name:"WANTO — Women in Apprenticeship & Nontraditional Occupations",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Trades",type:"Grant (via Community Partner)",level:"Federal",agency:"DOL Women's Bureau",act:"WANTO Act",maxBenefit:500000,benefitUnit:"per community org (employer partners receive supported candidates)",eligibility:"Employers committing to host women apprentices; community organizations do the recruiting and support",howToApply:"Partner with a WANTO grantee organization in your state; DOL lists current grantees at dol.gov/agencies/wb",notes:"Expands the trades talent pool. WANTO partners do the recruiting and support work; Sila brands provide apprenticeship slots. Positive workforce diversity impact with minimal administrative burden on the employer.",tags:["women","diversity","WANTO","apprenticeship","pipeline","nontraditional"]},

  {id:230,name:"Efficiency Maine — Contractor Training Fund",states:["ME"],trades:["HVAC"],category:"State",type:"Grant",level:"State",agency:"Efficiency Maine Trust",act:"Maine Clean Energy Jobs Act",maxBenefit:2500,benefitUnit:"per technician trained in qualifying clean energy installs",eligibility:"Maine HVAC contractors installing qualifying heat pump, heat pump water heater, or weatherization systems",howToApply:"efficiencymaine.com; contractor registration required; training subsidies apply to workforce training for clean energy installations",notes:"DIRECTLY RELEVANT to Dave's World (130 employees, Maine, specializes in heat pumps). Efficiency Maine actively funds heat pump installer training — Dave's World technicians are the exact target workforce. Also pairs with IRA clean energy apprenticeship bonus credits.",tags:["Maine","ME","heat pump","HVAC","Efficiency Maine","Dave's World","clean energy"]},

  {id:261,name:"Michigan Apprenticeship Program Plus (MAP+)",states:["MI"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"State",type:"Wage Subsidy",level:"State",agency:"Michigan LEO / Michigan Works!",act:"Michigan Going PRO expansion",maxBenefit:3000,benefitUnit:"per apprentice wage subsidy",eligibility:"MI employers with registered apprenticeship programs",howToApply:"Apply through Michigan Works! agencies after DOL apprenticeship registration",notes:"Supplements Going PRO for registered apprenticeships. Wage subsidy during apprenticeship + training cost reimbursement. Stack with federal OJT and WOTC for MI brands.",tags:["Michigan","MI","apprenticeship","MAP+","wage subsidy"]},
  {id:270,name:"NH Job Training Fund",states:["NH"],trades:["ALL"],category:"State",type:"Grant",level:"State",agency:"NH Dept. of Business and Economic Affairs",act:"NH RSA 188-F Job Training Fund",maxBenefit:100000,benefitUnit:"per employer project",eligibility:"NH businesses training workers; all industries",howToApply:"nheconomy.com; apply through NH Job Training Fund coordinator",notes:"Live Free Heating Cooling Electric (Concord) and TCC (Concord) are both NH Sila brands. A joint NH application from both brands could maximize the award. Vermont Technical College is also a good delivery partner for cross-border training.",tags:["New Hampshire","NH","training fund","Live Free","TCC","Concord"]},

.tab-btn.on{color:#D4A832;border-bottom-color:#D4A832}.tab-btn:hover:not(.on){color:#A0B8C4}
.loc-sel{font-family:'DM Sans',sans-serif;font-size:14px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(212,168,50,.35);color:#E2D9C5;border-radius:9px;padding:11px 40px 11px 14px;outline:none;width:100%;cursor:pointer;appearance:none;-webkit-appearance:none}
.loc-sel:focus{border-color:#D4A832;box-shadow:0 0 0 3px rgba(212,168,50,.12)}.loc-sel option,.loc-sel optgroup{background:#0D1E30;color:#E2D9C5}
.srch{font-family:'DM Sans',sans-serif;font-size:14px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,168,50,.2);color:#E2D9C5;border-radius:9px;padding:10px 14px;outline:none;width:100%;transition:border .2s}
.srch::placeholder{color:#2A4050}.srch:focus{border-color:#D4A832}
.fsel{font-family:'DM Sans',sans-serif;font-size:13px;background:rgba(10,24,38,.9);border:1.5px solid rgba(212,168,50,.2);color:#E2D9C5;border-radius:9px;padding:10px 12px;outline:none;cursor:pointer;transition:border .2s}.fsel:focus{border-color:#D4A832}.fsel option{background:#0D1E30}
.tf-pill{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);color:#6A8A9A;cursor:pointer;white-space:nowrap;transition:all .15s}
.tf-pill.on{background:rgba(212,168,50,.14);border-color:rgba(212,168,50,.5);color:#D4A832}.tf-pill:hover:not(.on){border-color:rgba(255,255,255,.18);color:#B0C8D4}
.pc{border-radius:11px;padding:15px 17px;margin-bottom:9px;cursor:pointer;transition:all .18s;border:1.5px solid rgba(255,255,255,.06)}
.pc:hover{border-color:rgba(212,168,50,.35)!important;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.pc.xp{border-color:rgba(212,168,50,.55)!important}
.badge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:100px;margin:0 4px 4px 0}
.crd{background:rgba(255,255,255,.04);border:1.5px solid rgba(212,168,50,.14);border-radius:11px;padding:18px 20px;margin-bottom:15px}
.cn{font-family:'DM Sans',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#4A6070;margin-bottom:5px}
.ci{font-family:'DM Sans',sans-serif;font-size:14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(212,168,50,.18);color:#E2D9C5;border-radius:7px;padding:9px 12px;outline:none;width:100%;transition:border .2s}.ci:focus{border-color:#D4A832}
.csel{font-family:'DM Sans',sans-serif;font-size:13px;background:rgba(10,20,35,.95);border:1.5px solid rgba(212,168,50,.18);color:#E2D9C5;border-radius:7px;padding:9px 12px;outline:none;width:100%;cursor:pointer}.csel option{background:#0D1E30}
.tgl{width:42px;height:24px;border-radius:12px;cursor:pointer;transition:background .2s;position:relative;border:none;flex-shrink:0;outline:none}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:3px;transition:left .2s}
.tgl.on{background:#D4A832}.tgl.on::after{left:21px}.tgl.off{background:#1A2F40}.tgl.off::after{left:3px}
.rr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(212,168,50,.09);font-family:'DM Sans',sans-serif}.rr:last-child{border-bottom:none}
.ag-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(212,168,50,.11);border-radius:10px;padding:14px 16px;margin-bottom:9px;transition:border .2s}.ag-card:hover{border-color:rgba(212,168,50,.3)}
.act-card{background:rgba(255,255,255,.03);padding:13px 16px;margin-bottom:8px;border-radius:0 10px 10px 0}
.scroll-x{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:3px}.scroll-x::-webkit-scrollbar-thumb{background:#D4A832;border-radius:2px}
.state-pill{display:inline-block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:100px;background:rgba(91,170,114,.14);color:#5BAA72;border:1px solid rgba(91,170,114,.3)}
.fed-pill{background:rgba(107,158,199,.12);color:#6B9EC7;border:1px solid rgba(107,158,199,.28)}
.vet-pill{background:rgba(120,181,216,.12);color:#78B5D8;border:1px solid rgba(120,181,216,.28)}
.eo-pill{background:rgba(232,160,32,.18);color:#E8A020;border:1px solid rgba(232,160,32,.4)}
.divider{border:none;border-top:1px solid rgba(212,168,50,.11);margin:13px 0}
`;

function App(){
  const[tab,setTab]=useState("programs");
  const[loc,setLoc]=useState("");
  const[search,setSearch]=useState("");
  const[trade,setTrade]=useState("ALL");
  const[catF,setCatF]=useState("ALL");
  const[openId,setOpenId]=useState(null);
  const[eoOpen,setEoOpen]=useState(false);
  // calc
  const[hires,setHires]=useState(5);
  const[wage,setWage]=useState(22);
  const[hrs,setHrs]=useState(40);
  const[weeks,setWeeks]=useState(8);
  const[wotcCat,setWotcCat]=useState(0);
  const[wotcPct,setWotcPct]=useState(40);
  const[ojt,setOjt]=useState(true);
  const[ojtP,setOjtP]=useState(50);
  const[iwt,setIwt]=useState(false);
  const[iwtC,setIwtC]=useState(2000);
  const[iwtP,setIwtP]=useState(50);
  const[appr,setAppr]=useState(true);
  const[stateC,setStateC]=useState(false);
  const[stateA,setStateA]=useState(2500);
  const[s127,setS127]=useState(false);
  const[s127A,setS127A]=useState(3000);
  const[txR,setTxR]=useState(25);

  const selectedLoc=useMemo(()=>SILA_LOCATIONS.find(l=>`${l.brand}|${l.state}`===loc),[loc]);
  const selectedState=selectedLoc?selectedLoc.state:null;
  const stateName=selectedState?STATE_NAMES[selectedState]:null;
  const stateLocations=useMemo(()=>selectedState?SILA_LOCATIONS.filter(l=>l.state===selectedState):[],[selectedState]);
  const totalStateEmp=stateLocations.reduce((a,l)=>a+(l.emp||0),0);

  const grouped=useMemo(()=>{
    const g={};
    SILA_LOCATIONS.forEach(l=>{if(!g[l.state])g[l.state]=[];g[l.state].push(l);});
    return g;
  },[]);

  const filtered=useMemo(()=>{
    return PROGRAMS.filter(p=>{
      const ms=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()))||(p.notes||"").toLowerCase().includes(search.toLowerCase());
      const mt=trade==="ALL"||(trade==="Veterans"&&p.category==="Veterans")||(trade==="Education"&&p.category==="Education")||p.trades.includes(trade)||p.trades.includes("ALL");
      const mc=catF==="ALL"||p.category===catF;
      const mst=!selectedState||p.states.includes("ALL")||p.states.includes(selectedState);
      return ms&&mt&&mc&&mst;
    }).sort((a,b)=>{
      const rank=p=>p.category==="Presidential"?0:selectedState&&p.states.includes(selectedState)&&!p.states.includes("ALL")?1:p.category==="Veterans"?2:p.category==="Education"?3:4;
      return rank(a)-rank(b);
    });
  },[search,trade,catF,selectedState]);

  const annWage=wage*hrs*52;
  const trnWages=wage*hrs*weeks;
  const wotcV=Math.min(WOTC_CATEGORIES[wotcCat].maxCredit,annWage*0.4)*(hires*wotcPct/100);
  const ojtV=ojt?trnWages*(ojtP/100)*hires:0;
  const iwtV=iwt?iwtC*(iwtP/100)*hires:0;
  const apprV=appr?2000*hires:0;
  const stateV=stateC?stateA*hires:0;
  const s127V=s127?Math.min(s127A,5250)*hires*(txR/100):0;
  const total=wotcV+ojtV+iwtV+apprV+stateV+s127V;
  const fmt=n=>n>=1000000?`$${(n/1000000).toFixed(2)}M`:`$${Math.round(n).toLocaleString()}`;

  const TABS=[{id:"programs",label:"Programs"},{id:"calculator",label:"Calculator"},{id:"acts",label:"Legislation"},{id:"agencies",label:"Agencies"}];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0A1826 0%,#0E2038 55%,#08141E 100%)"}}>
      <style>{SS}</style>

      {/* HEADER */}
      <div style={{maxWidth:980,margin:"0 auto",padding:"22px 16px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:6}}>
          <div>
            <p className="tb" style={{fontSize:11,letterSpacing:".17em",textTransform:"uppercase",color:"#D4A832",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>Sila Services · Learning &amp; Development</p>
            <h1 className="serif" style={{fontSize:"clamp(22px,4vw,33px)",color:"#F5EED8",letterSpacing:"-.01em",lineHeight:1.15}}>Training Incentives Navigator</h1>
            <p style={{color:"#4A6A7A",fontSize:13,marginTop:6,lineHeight:1.6,fontFamily:"'DM Sans',sans-serif"}}>Trades-focused workforce development grants, tax credits &amp; incentives — location-aware, veteran-ready, Pell-integrated.</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:11,color:"#344A58",letterSpacing:".08em",marginBottom:2,fontFamily:"'DM Sans',sans-serif"}}>KNOWLEDGE BASE</div>
            <div style={{fontSize:30,fontWeight:800,color:"#D4A832",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{PROGRAMS.length}</div>
            <div style={{fontSize:11,color:"#344A58",fontFamily:"'DM Sans',sans-serif"}}>programs tracked</div>
            <div style={{marginTop:7,background:"rgba(212,168,50,.09)",border:"1.5px solid rgba(212,168,50,.28)",borderRadius:100,padding:"3px 11px",display:"inline-flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#5BAA72",display:"inline-block",flexShrink:0}}/>
              <span style={{fontSize:11,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>Updated {KB_LAST_UPDATED}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid rgba(212,168,50,.14)",marginTop:18,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px 60px"}}>

        {/* ═══ PROGRAMS ═══ */}
        {tab==="programs"&&(
          <div>
            {/* Location Picker */}
            <div style={{background:"linear-gradient(135deg,rgba(212,168,50,.1),rgba(212,168,50,.03))",border:"1.5px solid rgba(212,168,50,.28)",borderRadius:13,padding:"18px 20px",marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:22}}>📍</span>
                <div>
                  <div style={{fontWeight:600,fontSize:14,color:"#F5EED8",fontFamily:"'DM Sans',sans-serif"}}>Select Your Work Location</div>
                  <div style={{fontSize:12,color:"#4A6A7A",fontFamily:"'DM Sans',sans-serif"}}>State-specific programs surface automatically — plus all federal programs always apply</div>
                </div>
              </div>
              <div style={{position:"relative"}}>
                <select className="loc-sel" value={loc} onChange={e=>setLoc(e.target.value)}>
                  <option value="">— All Locations (show all federal programs) —</option>
                  {Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).map(([st,locs])=>(
                    <optgroup key={st} label={`── ${STATE_NAMES[st]||st} (${st}) ──`}>
                      {locs.map(l=>(
                        <option key={l.brand+l.state} value={`${l.brand}|${l.state}`}>
                          {l.brand} — {l.city}{l.emp?` · ${l.emp} emp`:""}
                        </option>
                      ))}
                    </optgroup>
                  ))}
                </select>
                <span style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",color:"#D4A832",pointerEvents:"none",fontSize:13}}>▾</span>
              </div>

              {selectedLoc&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(212,168,50,.15)",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:14,fontWeight:700,color:"#F5EED8",fontFamily:"'DM Sans',sans-serif"}}>{selectedLoc.brand}</span>
                    <span style={{fontSize:13,color:"#5A7A8A",marginLeft:8,fontFamily:"'DM Sans',sans-serif"}}>{selectedLoc.city}, {selectedLoc.state}</span>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {selectedLoc.specialty.map(s=>(
                      <span key={s} className="badge" style={{background:"rgba(106,191,192,.12)",color:"#6ABFC0",border:"1px solid rgba(106,191,192,.25)"}}>{s}</span>
                    ))}
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span className="state-pill">{stateName} Programs Active</span>
                    {stateLocations.length>1&&(
                      <span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>{stateLocations.length} brands in {selectedLoc.state}{totalStateEmp>0?` · ${totalStateEmp.toLocaleString()}+ employees`:""}</span>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Presidential EO Banner */}
            <div style={{background:"linear-gradient(135deg,rgba(232,160,32,.13),rgba(180,110,20,.05))",border:"1.5px solid rgba(232,160,32,.42)",borderRadius:13,padding:"16px 18px",marginBottom:18,cursor:"pointer"}} onClick={()=>setEoOpen(!eoOpen)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <span className="badge eo-pill">⚡ Active Executive Order</span>
                    <span style={{fontSize:12,color:"#8A6018",fontFamily:"'DM Sans',sans-serif"}}>Signed April 23, 2025 · President Trump · Trades Priority</span>
                  </div>
                  <div className="serif" style={{fontSize:"clamp(14px,2.2vw,18px)",color:"#F5EED8",lineHeight:1.3}}>{PRESIDENTIAL_MANDATE.title}</div>
                  <div style={{fontSize:13,color:"#C8A040",marginTop:7,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>Goal: {PRESIDENTIAL_MANDATE.goal}</div>
                  {!eoOpen&&<div style={{fontSize:11,color:"#6A5020",marginTop:4,fontFamily:"'DM Sans',sans-serif"}}>Tap to see full directives, Sila opportunity analysis &amp; what to watch →</div>}
                </div>
                <div style={{color:"#D4A832",fontSize:17,flexShrink:0,paddingTop:2}}>{eoOpen?"▲":"▼"}</div>
              </div>
              {eoOpen&&(
                <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid rgba(232,160,32,.2)"}} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:16}}>
                    <div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:8}}>KEY DIRECTIVES</div>
                      <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:7}}>
                        {PRESIDENTIAL_MANDATE.keyDirectives.map((d,i)=>(
                          <li key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                            <span style={{color:"#D4A832",fontSize:11,marginTop:3,flexShrink:0}}>→</span>
                            <span style={{fontSize:12,color:"#C0A058",lineHeight:1.65,fontFamily:"'DM Sans',sans-serif"}}>{d}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:6}}>OPPORTUNITY FOR SILA</div>
                      <div style={{fontSize:13,color:"#D4B870",lineHeight:1.7,marginBottom:14,fontFamily:"'DM Sans',sans-serif"}}>{PRESIDENTIAL_MANDATE.silaOpportunity}</div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:4}}>WATCH FOR</div>
                      <div style={{fontSize:12,color:"#A08040",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{PRESIDENTIAL_MANDATE.watchFor}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Filter Bar */}
            <div style={{marginBottom:13}}>
              <div className="scroll-x" style={{marginBottom:9}}>
                {TRADE_FILTERS.map(f=>(
                  <button key={f.key} className={`tf-pill${trade===f.key?" on":""}`} onClick={()=>setTrade(f.key)}>
                    <span>{f.icon}</span>{f.label}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 210px"}}><input className="srch" placeholder="Search programs, certifications, trades, states…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
                <select className="fsel" value={catF} onChange={e=>setCatF(e.target.value)}>
                  <option value="ALL">All Categories</option>
                  {Object.entries(CAT_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>
            <div style={{fontSize:12,color:"#2A4050",marginBottom:11,fontFamily:"'DM Sans',sans-serif"}}>
              Showing {filtered.length} of {PROGRAMS.length} programs{selectedState?` · ${stateName} programs shown first`:""}
            </div>

            {/* Program Cards */}
            {filtered.map(p=>{
              const isOpen=openId===p.id;
              const tc=getTC(p.type);
              const isState=selectedState&&p.states.includes(selectedState)&&!p.states.includes("ALL");
              const isEO=p.category==="Presidential";
              const isVet=p.category==="Veterans";
              const isEdu=p.category==="Education";
              const cardBg=isEO?"rgba(232,160,32,.07)":isState?"rgba(91,170,114,.06)":CAT_BG[p.category]||"rgba(255,255,255,.03)";
              const cardBorder=isEO?"1.5px solid rgba(232,160,32,.38)":isState?"1.5px solid rgba(91,170,114,.28)":"1.5px solid rgba(255,255,255,.06)";
              return(
                <div key={p.id} className={`pc${isOpen?" xp":""}`} style={{background:cardBg,border:cardBorder}} onClick={()=>setOpenId(isOpen?null:p.id)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:3,marginBottom:7}}>
                        <span className="badge" style={{background:tc+"20",color:tc,border:`1px solid ${tc}40`}}>{p.type}</span>
                        {isEO&&<span className="badge eo-pill">⚡ EO Priority</span>}
                        {isState&&<span className="badge state-pill">📍 {selectedLoc.state}</span>}
                        {isVet&&<span className="badge vet-pill">🎖 Veterans</span>}
                        {isEdu&&<span className="badge" style={{background:"rgba(139,181,160,.14)",color:"#8BB5A0",border:"1px solid rgba(139,181,160,.3)"}}>🎓 Education</span>}
                        {!isState&&!isEO&&<span className="badge fed-pill">{p.level}</span>}
                      </div>
                      <div style={{fontSize:"clamp(13px,2vw,15px)",fontWeight:600,color:"#F0E8D4",lineHeight:1.3,fontFamily:"'DM Sans',sans-serif",wordBreak:"break-word"}}>{p.name}</div>
                      <div style={{fontSize:12,color:"#3A5C6A",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>{p.agency}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,paddingLeft:8}}>
                      {p.maxBenefit!=null&&(
                        <>
                          <div style={{fontSize:18,fontWeight:800,color:isEO?"#D4A832":isState?"#5BAA72":isVet?"#78B5D8":tc,fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>
                            {typeof p.maxBenefit==="number"&&p.maxBenefit>100?`$${p.maxBenefit.toLocaleString()}`:`${p.maxBenefit}%`}
                          </div>
                          <div style={{fontSize:10,color:"#2A4050",maxWidth:90,textAlign:"right",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3,marginTop:2}}>{p.benefitUnit}</div>
                        </>
                      )}
                      {p.maxBenefit==null&&<div style={{fontSize:12,color:"#4A6070",fontFamily:"'DM Sans',sans-serif",maxWidth:80,textAlign:"right"}}>See notes</div>}
                      <div style={{color:"#D4A832",fontSize:11,marginTop:6}}>{isOpen?"▲ close":"▼ details"}</div>
                    </div>
                  </div>

                  {isOpen&&(
                    <div style={{marginTop:13}} onClick={e=>e.stopPropagation()}>
                      <hr className="divider"/>
                      <div style={{display:"grid",gap:12}}>
                        {p.act&&<div><div className="cn">Authorizing Legislation</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{p.act}</div></div>}
                        <div><div className="cn">Eligibility</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.eligibility}</div></div>
                        <div><div className="cn">How to Apply</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.howToApply}</div></div>
                        <div style={{background:isEO?"rgba(232,160,32,.08)":"rgba(212,168,50,.07)",border:`1px solid ${isEO?"rgba(232,160,32,.25)":"rgba(212,168,50,.17)"}`,borderRadius:8,padding:"12px 14px"}}>
                          <div className="cn" style={{color:isEO?"#D4A832":"#A08030",marginBottom:5}}>💡 Strategy Note</div>
                          <div style={{fontSize:13,color:isEO?"#D4B870":"#C8BC80",lineHeight:1.72,fontFamily:"'DM Sans',sans-serif"}}>{p.notes}</div>
                        </div>
                        <div>
                          <div className="cn" style={{marginBottom:5}}>Applicable Trades</div>
                          {p.trades.map(t=>(
                            <span key={t} className="badge" style={{background:"rgba(106,191,192,.11)",color:"#6ABFC0",border:"1px solid rgba(106,191,192,.22)"}}>{t}</span>
                          ))}
                        </div>
                        {p.states[0]!=="ALL"&&(
                          <div>
                            <div className="cn" style={{marginBottom:5}}>States</div>
                            {p.states.map(s=>(
                              <span key={s} className="badge state-pill" style={{marginRight:4}}>{STATE_NAMES[s]||s}</span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>
                <div style={{fontSize:28,marginBottom:10}}>🔍</div>
                <div style={{fontSize:14}}>No programs match your filters. Try broadening the trade type or clearing search.</div>
              </div>
            )}
          </div>
        )}

        {/* ═══ CALCULATOR ═══ */}
        {tab==="calculator"&&(
          <div>
            {selectedLoc?(
              <div style={{background:"rgba(91,170,114,.08)",border:"1.5px solid rgba(91,170,114,.25)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>📍</span>
                <span style={{fontSize:13,color:"#8BB5A0",fontFamily:"'DM Sans',sans-serif"}}>Calculating for <strong style={{color:"#F0E8D4"}}>{selectedLoc.brand}</strong> — {selectedLoc.city}, {selectedLoc.state} · {selectedLoc.specialty.join(", ")}</span>
              </div>
            ):(
              <div style={{background:"rgba(212,168,50,.06)",border:"1.5px solid rgba(212,168,50,.2)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>💡</span>
                <span style={{fontSize:13,color:"#C0A870",fontFamily:"'DM Sans',sans-serif"}}>Tip: Select a location on the Programs tab for state-specific credit suggestions.</span>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:20}}>
              {/* LEFT: Inputs */}
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Hire Parameters</h2>
                <div className="crd">
                  <div style={{display:"grid",gap:12}}>
                    {[[hires,setHires,"Number of New Hires",1,1,"number"],[wage,setWage,"Starting Hourly Wage ($)",7.25,0.25,"number"]].map(([v,s,l,mn,st,tp])=>(
                      <div key={l}><div className="cn">{l}</div><input type={tp} className="ci" value={v} min={mn} step={st||1} onChange={e=>s(tp==="number"?(st&&st<1?parseFloat(e.target.value)||mn:Math.max(mn,parseInt(e.target.value)||mn)):e.target.value)}/></div>
                    ))}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div><div className="cn">Hours/Week</div><input type="number" className="ci" value={hrs} min={1} max={60} onChange={e=>setHrs(parseInt(e.target.value)||40)}/></div>
                      <div><div className="cn">Training Weeks</div><input type="number" className="ci" value={weeks} min={1} onChange={e=>setWeeks(parseInt(e.target.value)||8)}/></div>
                    </div>
                    <div><div className="cn">Corp. Tax Rate (%)</div><input type="number" className="ci" value={txR} min={1} max={50} onChange={e=>setTxR(parseInt(e.target.value)||25)}/></div>
                  </div>
                  <div style={{fontSize:11,color:"#2A4050",marginTop:9,fontFamily:"'DM Sans',sans-serif"}}>1st-yr wage: {fmt(annWage)} · Training wages: {fmt(trnWages)}</div>
                </div>

                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>WOTC Tax Credit</h2>
                <div className="crd">
                  <div style={{marginBottom:11}}><div className="cn">Employee Category</div>
                    <select className="csel" value={wotcCat} onChange={e=>setWotcCat(parseInt(e.target.value))}>
                      {WOTC_CATEGORIES.map((c,i)=><option key={i} value={i}>{c.label} (max ${c.maxCredit.toLocaleString()})</option>)}
                    </select>
                  </div>
                  <div><div className="cn">% of This Hire Class in This Category</div><input type="number" className="ci" value={wotcPct} min={0} max={100} onChange={e=>setWotcPct(parseInt(e.target.value)||0)}/></div>
                </div>

                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Programs to Stack</h2>
                <div className="crd">
                  {[
                    {on:ojt,set:setOjt,label:"OJT Wage Reimbursement (WIOA)",sub:"50–75% of training wages for new hires",extra:ojt&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Reimbursement %</div><input type="number" className="ci" value={ojtP} min={0} max={75} onChange={e=>setOjtP(parseInt(e.target.value)||50)}/><div style={{fontSize:11,color:"#2A4050",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>Max 75% for smaller employers</div></div>},
                    {on:iwt,set:setIwt,label:"Incumbent Worker Training Grant",sub:"Upskill existing technicians (NATE, EPA 608…)",extra:iwt&&<div style={{paddingLeft:52,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}><div><div className="cn">Cost/Employee ($)</div><input type="number" className="ci" value={iwtC} onChange={e=>setIwtC(parseInt(e.target.value)||0)}/></div><div><div className="cn">Reimbursement %</div><input type="number" className="ci" value={iwtP} min={0} max={90} onChange={e=>setIwtP(parseInt(e.target.value)||50)}/></div></div>},
                    {on:appr,set:setAppr,label:"Registered Apprenticeship Grant",sub:"~$2,000/apprentice federal base + state credits"},
                    {on:stateC,set:setStateC,label:`State Apprenticeship Credit${selectedState?" ("+selectedState+")":""}`,sub:"Enter your state's credit amount below",extra:stateC&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">State Credit per Apprentice ($)</div><input type="number" className="ci" value={stateA} onChange={e=>setStateA(parseInt(e.target.value)||0)}/><div style={{fontSize:11,color:"#2A4050",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>PA: $2,500 · NY: $5,000 · NJ: $5,000 · IL: $2,500 · OH: $2,000+</div></div>},
                    {on:s127,set:setS127,label:"§127 Educational Assistance Tax Savings",sub:"Tax-free tuition, certs, coursework up to $5,250/yr",extra:s127&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Annual Benefit/Employee (max $5,250)</div><input type="number" className="ci" value={s127A} min={0} max={5250} onChange={e=>setS127A(Math.min(5250,parseInt(e.target.value)||0))}/></div>}
                  ].map(({on,set,label,sub,extra},i)=>(
                    <div key={i} style={{marginBottom:extra?0:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:6}}>
                        <button className={`tgl ${on?"on":"off"}`} onClick={()=>set(!on)}/>
                        <div><div style={{fontSize:13,fontWeight:600,color:"#D0D8E0",fontFamily:"'DM Sans',sans-serif"}}>{label}</div><div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{sub}</div></div>
                      </div>
                      {extra}
                    </div>
                  ))}
                </div>
              </div>

              {/* RIGHT: Results */}
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Estimated Annual Savings</h2>
                <div style={{background:"linear-gradient(135deg,rgba(212,168,50,.18),rgba(212,168,50,.06))",border:"2.5px solid #D4A832",borderRadius:15,padding:"24px 20px",textAlign:"center",marginBottom:15}}>
                  <div className="cn" style={{marginBottom:7}}>Total Estimated Offset</div>
                  <div style={{fontSize:"clamp(38px,7vw,56px)",fontWeight:900,color:"#D4A832",letterSpacing:"-.02em",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{fmt(total)}</div>
                  <div style={{fontSize:12,color:"#5A7A8A",marginTop:6,fontFamily:"'DM Sans',sans-serif"}}>across {hires} new hire{hires!==1?"s":""}</div>
                  {hires>0&&<div style={{fontSize:16,color:"#C0D0DC",marginTop:8,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{fmt(total/hires)} avg per hire</div>}
                </div>

                <div className="crd">
                  <div className="cn" style={{marginBottom:11}}>Breakdown</div>
                  {[
                    {l:"WOTC Tax Credit",sub:`${wotcPct}% of hires · ${WOTC_CATEGORIES[wotcCat].label.split("(")[0].trim()}`,v:wotcV,c:"#D4A832"},
                    ojt?{l:"OJT Wage Reimbursement",sub:`${ojtP}% × ${weeks} wks × ${hires} hires`,v:ojtV,c:"#6B9EC7"}:null,
                    iwt?{l:"Incumbent Worker Training",sub:`${iwtP}% of $${iwtC.toLocaleString()} × ${hires}`,v:iwtV,c:"#A07CC5"}:null,
                    appr?{l:"Apprenticeship Grant (base)",sub:`$2,000 × ${hires}`,v:apprV,c:"#5BAA72"}:null,
                    stateC?{l:`State Credit${selectedState?" ("+selectedState+")":""}`,sub:`$${stateA.toLocaleString()} × ${hires}`,v:stateV,c:"#5BAA72"}:null,
                    s127?{l:"§127 Tax Savings",sub:`${txR}% rate × $${Math.min(s127A,5250).toLocaleString()} × ${hires}`,v:s127V,c:"#8BB5A0"}:null
                  ].filter(Boolean).map((r,i)=>(
                    <div key={i} className="rr">
                      <div><div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif"}}>{r.l}</div><div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{r.sub}</div></div>
                      <div style={{fontWeight:800,color:r.c,fontSize:15,flexShrink:0,fontFamily:"'DM Sans',sans-serif"}}>{fmt(r.v)}</div>
                    </div>
                  ))}
                  <div style={{borderTop:"2px solid rgba(212,168,50,.22)",marginTop:5,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:600,fontSize:14,color:"#E2D9C5",fontFamily:"'DM Sans',sans-serif"}}>Total</div>
                    <div style={{fontSize:24,fontWeight:900,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>{fmt(total)}</div>
                  </div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                  {[{l:"Gross 1st-Yr",v:fmt(annWage),c:"#C07A5A"},{l:"Offset/Hire",v:fmt(total/Math.max(hires,1)),c:"#5BAA72"},{l:"Net 1st-Yr",v:fmt(Math.max(0,annWage-total/Math.max(hires,1))),c:"#6B9EC7"}].map(x=>(
                    <div key={x.l} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(212,168,50,.1)",borderRadius:9,padding:"11px 8px",textAlign:"center"}}>
                      <div className="cn" style={{fontSize:9}}>{x.l}</div>
                      <div style={{fontSize:14,fontWeight:800,color:x.c,fontFamily:"'DM Sans',sans-serif"}}>{x.v}</div>
                    </div>
                  ))}
                </div>

                <div style={{background:"rgba(120,181,216,.07)",border:"1.5px solid rgba(120,181,216,.2)",borderRadius:9,padding:14,marginBottom:11}}>
                  <div className="cn" style={{color:"#78B5D8",marginBottom:5}}>🎖 Add GI Bill / SkillBridge (not in calculator above)</div>
                  <div style={{fontSize:12,color:"#6A8AA0",lineHeight:1.75,fontFamily:"'DM Sans',sans-serif"}}>
                    <strong style={{color:"#C0D0DC"}}>Post-9/11 GI Bill Apprentice:</strong> VA pays $1,800–$2,717/month directly to the veteran — ON TOP of their Sila wage. Zero extra cost to employer.<br/>
                    <strong style={{color:"#C0D0DC"}}>DOD SkillBridge:</strong> DOD pays the active-duty member's full military salary during their 4–6 month apprenticeship. Employer labor cost: <strong style={{color:"#5BAA72"}}>$0</strong>.
                  </div>
                </div>

                <div style={{background:"rgba(91,170,114,.06)",border:"1.5px solid rgba(91,170,114,.18)",borderRadius:9,padding:12}}>
                  <div style={{fontSize:12,color:"#6A8A78",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>
                    <strong style={{color:"#5BAA72"}}>⚠ Planning Estimate Only.</strong> Actual benefits depend on eligibility determinations, state-specific rules, program availability, and timing. Verify with a workforce development specialist or CPA.
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ═══ LEGISLATION ═══ */}
        {tab==="acts"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Federal legislation and executive orders authorizing workforce training incentives for trades employers. Understanding the statutory basis strengthens grant applications and internal business cases.</p>
            {ACTS.map((a,i)=>(
              <div key={i} className="act-card" style={{borderLeft:`3.5px solid ${a.highlight?"#E8A020":"#D4A832"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:600,color:"#F0E8D4",lineHeight:1.3,fontFamily:"'DM Sans',sans-serif"}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#2A4050",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{typeof a.year==="number"?`Enacted ${a.year}`:`Updated ${a.year}`} · {a.agency}</div>
                  </div>
                  {a.highlight?<span className="badge eo-pill">⚡ Active Priority</span>:<span className="badge" style={{background:"rgba(212,168,50,.1)",color:"#D4A832",border:"1px solid rgba(212,168,50,.25)",height:"fit-content"}}>{a.year}</span>}
                </div>
                <div style={{fontSize:13,color:"#7A9AB0",lineHeight:1.72,fontFamily:"'DM Sans',sans-serif"}}>{a.scope}</div>
              </div>
            ))}
            <div style={{marginTop:22,background:"rgba(212,168,50,.05)",border:"1.5px solid rgba(212,168,50,.17)",borderRadius:11,padding:18}}>
              <div className="cn" style={{marginBottom:10}}>VERSION HISTORY</div>
              {KB_VERSION_HISTORY.map((v,i)=>(
                <div key={i} style={{display:"flex",gap:11,alignItems:"baseline",marginBottom:6,flexWrap:"wrap"}}>
                  <span className="badge" style={{background:"rgba(212,168,50,.1)",color:"#D4A832",border:"1px solid rgba(212,168,50,.25)"}}>{v.v}</span>
                  <span style={{fontSize:12,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{v.date}</span>
                  <span style={{fontSize:12,color:"#7A8AA0",fontFamily:"'DM Sans',sans-serif"}}>{v.notes}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ═══ AGENCIES ═══ */}
        {tab==="agencies"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Federal, state, and industry agencies administering training incentives for trades employers. Each is a potential partner, funder, or compliance authority for Sila brands.</p>
            {AGENCIES.map((a,i)=>(
              <div key={i} className="ag-card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"#F0E8D4",fontFamily:"'DM Sans',sans-serif"}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#D4A832",marginTop:1,fontFamily:"'DM Sans',sans-serif"}}>{a.dept}</div>
                  </div>
                  <a href={a.url} target="_blank" rel="noopener noreferrer"
                    style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#6B9EC7",textDecoration:"none",border:"1px solid rgba(107,158,199,.28)",borderRadius:5,padding:"4px 10px",whiteSpace:"nowrap",flexShrink:0}}>
                    ↗ {a.url.replace("https://","")}
                  </a>
                </div>
                <div style={{fontSize:13,color:"#6A8AAA",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{a.role}</div>
              </div>
            ))}

            <div style={{marginTop:22,background:"rgba(212,168,50,.05)",border:"1.5px solid rgba(212,168,50,.2)",borderRadius:12,padding:20}}>
              <div style={{fontSize:15,fontWeight:700,color:"#D4A832",marginBottom:14,fontFamily:"'DM Sans',sans-serif"}}>📋 Priority Action Sequence — L&amp;D Playbook</div>
              {[
                ["1. Register Apprenticeship NOW","Fastest action under the Trump EO. Go to apprenticeship.gov. Unlocks WOTC stacking, state credits, GI Bill eligibility, and IRA bonus credits simultaneously. Takes 4-6 weeks — start today."],
                ["2. Contact Your Local American Job Center","Execute OJT agreements BEFORE your next new hire. Retroactive claims are not allowed. Find your AJC at careeronestop.org."],
                ["3. Assign a WOTC Owner","Form 8850 must be filed within 28 days of each eligible hire. Assign someone to own this process — missed deadlines forfeit the credit permanently."],
                ["4. Register for DOD SkillBridge","skillbridge.defense.gov. Post apprenticeship slots. Receive active-duty candidates at zero labor cost within 60 days of setup."],
                ["5. Ohio TechCred — Apply Every Quarter","techcred.ohio.gov. With 6 OH brands and 250+ employees, Ohio TechCred quarterly applications are a recurring high-value action ($30,000/brand/round for NATE, EPA 608, building automation credentials)."],
                ["6. Michigan Going PRO — Spring Application","Carter's Plumbing and Levine & Sons: apply every spring at michigan.gov/leo. Up to $900,000 per employer project. High ROI application."],
                ["7. Coordinate MA Workforce Training Fund","All MA brands (Boston Standard, Central Cooling, N.E.T.R., Nashoba, TriState, Sila Stoneham) should coordinate a single $250,000 WTFP application at workforcetrainingfund.org."],
                ["8. Set Up §127 Educational Assistance Plan","One-time legal plan document (any employment attorney, ~$1-2K). Immediately begin offering NATE/EPA 608/community college coverage tax-free to all technicians."]
              ].map(([title,body],i)=>(
                <div key={i} style={{marginBottom:13,paddingLeft:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#E2D9C5",marginBottom:3,fontFamily:"'DM Sans',sans-serif"}}>{title}</div>
                  <div style={{fontSize:12,color:"#7A8AAA",lineHeight:1.72,fontFamily:"'DM Sans',sans-serif"}}>{body}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"13px 16px 26px",borderTop:"1px solid rgba(212,168,50,.08)"}}>
        <div style={{fontSize:10,color:"#1A2E3A",letterSpacing:".08em",fontFamily:"'DM Sans',sans-serif"}}>
          SILA SERVICES · L&amp;D TRAINING INCENTIVES NAVIGATOR · {KB_LAST_UPDATED} · CONFIDENTIAL — INTERNAL USE ONLY
        </div>
        <div style={{fontSize:10,color:"#1A2E3A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>
          {SILA_LOCATIONS.length} brands · {Object.keys(STATE_NAMES).length} states · {PROGRAMS.length} programs tracked · Goldman Sachs Alternatives PE
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

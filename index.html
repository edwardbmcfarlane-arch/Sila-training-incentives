  {id:100,directBenefit:true,name:"Registered Apprenticeship — EO Priority (Fast-Track)",states:["ALL"],trades:["ALL"],category:"Presidential",type:"Grant + Expedited Access",level:"Federal",agency:"DOL Office of Apprenticeship",act:"Exec. Order 'Preparing Americans for High-Paying Skilled Trade Jobs' (Apr 23, 2025)",maxBenefit:7000,benefitUnit:"per apprentice (combined credits)",calcMax:7000,valueBasis:"per apprentice",url:"https://www.apprenticeship.gov/employers/registered-apprenticeship-program",urlLabel:"Register at apprenticeship.gov",eligibility:"All employers. HVAC, Plumbing, Electrical are explicit EO priority sectors. Processing streamlined under Trump EO.",howToApply:"Register at apprenticeship.gov — takes ~2 hours online. Partner with your local American Job Center to fast-track. File for state credit simultaneously.",notes:"🔥 HIGHEST PRIORITY: Registering your in-house OJT program as a formal apprenticeship unlocks WOTC stacking, state credits, GI Bill eligibility, and IRA bonus credits simultaneously. The registration formalizes what Sila already does — in-house training — and makes it fundable.",tags:["presidential","EO","apprenticeship","OJT","in-house","priority"]},
  {id:1,directBenefit:true,name:"Work Opportunity Tax Credit (WOTC)",states:["ALL"],trades:["ALL"],category:"Federal-Tax",type:"Tax Credit",level:"Federal",agency:"IRS / DOL",act:"Consolidated Appropriations Act (extended through 2025)",maxBenefit:9600,benefitUnit:"per hire",calcMax:9600,valueBasis:"per hire",url:"https://www.dol.gov/agencies/eta/wotc",urlLabel:"DOL WOTC Program",eligibility:"Employers hiring from 10 target groups: veterans, SNAP recipients, ex-felons, vocational rehab referrals, long-term unemployed (27+ weeks), TANF recipients.",howToApply:"File IRS Form 8850 within 28 DAYS of employee start date. Submit to State Workforce Agency. Missing this deadline forfeits the credit permanently.",notes:"Tax credit directly reduces Sila's federal tax bill — no external school involved. 40% of first-year wages for most categories. Up to $9,600 for certain veterans. Stack with OJT reimbursement for maximum offset on every qualifying new hire.",tags:["WOTC","tax credit","hiring","direct","veteran"]},
  {id:2,directBenefit:true,name:"§127 Educational Assistance Plan",states:["ALL"],trades:["ALL"],category:"Federal-Tax",type:"Tax Exclusion",level:"Federal",agency:"IRS",act:"Internal Revenue Code §127",maxBenefit:5250,benefitUnit:"per employee/year tax-free",calcMax:5250,valueBasis:"per employee/yr",url:"https://www.irs.gov/publications/p15-b",urlLabel:"IRS Publication 15-B",eligibility:"All employers with a written qualified plan. Covers NATE prep, EPA 608, OSHA, diagnostic coursework, any in-house or external training up to $5,250/year.",howToApply:"One-time plan document setup with an employment attorney (~$1-2K legal cost). Benefits immediately deductible to Sila, zero income/FICA tax to employee.",notes:"Directly offsets in-house training cost. Employer deducts 100% of training cost AND employee pays zero tax on the benefit. Makes NATE certification, EPA 608, and any Sila University coursework cheaper for both sides.",tags:["§127","education","NATE","EPA 608","in-house","tax","direct"]},
  {id:3,directBenefit:true,name:"IRA Clean Energy Apprenticeship Bonus Credits",states:["ALL"],trades:["HVAC","Electrical"],category:"Federal-Tax",type:"Tax Incentive Bonus",level:"Federal",agency:"IRS / DOE",act:"Inflation Reduction Act §§48C, 45V, 48E",maxBenefit:null,benefitUnit:"10% bonus on clean energy credits for prevailing wage + apprenticeship",calcMax:5000,valueBasis:"estimated bonus value",url:"https://www.energy.gov/eere/workforce-development",urlLabel:"DOE Workforce Development",eligibility:"HVAC/electrical employers installing heat pumps, mini-splits, EV chargers with apprentices trained in-house under a registered apprenticeship program.",howToApply:"Register in-house apprenticeship with DOL before work commences. Maintain prevailing wage records. Claim bonus on applicable IRS forms.",notes:"Bonus credit flows directly to Sila for work performed by your own in-house apprentices. Dave's World (ME, 130 employees, heat pump specialist) is the most directly positioned brand.",tags:["IRA","heat pump","HVAC","clean energy","in-house","bonus"]},
  {id:4,directBenefit:true,name:"R&E Credit — Proprietary Training Curriculum",states:["ALL"],trades:["Technology"],category:"Federal-Tax",type:"Tax Credit",level:"Federal",agency:"IRS",act:"IRC §41",maxBenefit:null,benefitUnit:"20% of qualified research wages",calcMax:8000,valueBasis:"estimated annual value",url:"https://www.irs.gov/businesses/credits-deductions-for-businesses",urlLabel:"IRS Business Credits",eligibility:"Employers developing new in-house training methodologies, proprietary curricula, LMS platforms, or diagnostic assessment systems.",howToApply:"File IRS Form 6765. Document qualified research activities. Work with a tax advisor specializing in R&E credits.",notes:"Sila University curriculum development, ServiceTitan training programs, and novel in-house diagnostic training qualify. Directly offsets the cost of building your training infrastructure.",tags:["R&D","curriculum","Sila University","in-house","technology"]},
  {id:10,directBenefit:true,name:"On-the-Job Training (OJT) — WIOA Title I",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Federal-Wage",type:"Wage Reimbursement",level:"Federal",agency:"DOL / Local Workforce Development Boards",act:"Workforce Innovation and Opportunity Act (WIOA) 2014",maxBenefit:75,benefitUnit:"% of wages reimbursed while training at your shop",calcMax:6600,valueBasis:"per hire (typical 8 wks)",url:"https://www.careeronestop.org/BusinessCenter/TrainAndRetain/FundingEmployeeTraining/state-and-federal-grants.aspx?secondaryNavPanels=BA%3D%3D",urlLabel:"Find Your Local WDB — CareerOneStop",eligibility:"Employers hiring WIOA-eligible workers. Training happens at your facility under your supervision. Employer commits to permanent placement.",howToApply:"Contact local American Job Center BEFORE hiring. Execute OJT agreement FIRST, then hire. Retroactive claims are NOT permitted.",notes:"This is exactly what Sila already does — train new technicians on the job at your facility. The government reimburses 50-75% of their wages during that period. A new HVAC tech at $22/hr for 8 weeks = ~$3,500 reimbursed directly to Sila. Must be set up before the hire.",tags:["OJT","wage reimbursement","in-house","direct","WIOA","new hire"]},
  {id:11,directBenefit:true,name:"Incumbent Worker Training (IWT) — WIOA",states:["ALL"],trades:["ALL"],category:"Federal-Wage",type:"Grant",level:"Federal / State",agency:"State Workforce Agencies / WDBs",act:"Workforce Innovation and Opportunity Act (WIOA)",maxBenefit:50,benefitUnit:"% of in-house training costs reimbursed",calcMax:2500,valueBasis:"per employee (typical)",url:"https://www.careeronestop.org/BusinessCenter/TrainAndRetain/FundingEmployeeTraining/state-and-federal-grants.aspx?secondaryNavPanels=BA%3D%3D",urlLabel:"Find Your Local WDB — CareerOneStop",eligibility:"Existing employees being upskilled. Training can be conducted in-house by Sila instructors or by a contracted trainer at your facility. No income limit on employees.",howToApply:"Apply through local Workforce Development Board with a training plan and cost breakdown before training begins.",notes:"Reimburses up to 50% of what you spend running in-house skills training for current technicians — NATE prep, EPA 608, diagnostic skills, ServiceTitan, OSHA. Ask your WDB about multi-employer IWT grants where several Sila brands apply jointly.",tags:["IWT","incumbent","in-house","upskill","NATE","EPA 608","direct"]},
  {id:12,directBenefit:true,name:"Federal Bonding Program",states:["ALL"],trades:["ALL"],category:"Federal-Grant",type:"Benefit-in-Kind",level:"Federal",agency:"DOL ETA",act:"WIOA",maxBenefit:25000,benefitUnit:"free fidelity bond per at-risk hire",calcMax:25000,valueBasis:"lump sum coverage",url:"https://www.dol.gov/agencies/eta/bonding",urlLabel:"DOL Federal Bonding Program",eligibility:"Employers hiring at-risk individuals: ex-offenders, recovering addicts, homeless individuals, economically disadvantaged youth.",howToApply:"Contact State Bonding Coordinator via your American Job Center. Free, minimal paperwork.",notes:"Directly reduces Sila's hiring risk. Ex-offenders are strong trades apprenticeship candidates but bond requirements often disqualify them. This program provides $25,000 coverage at zero cost to Sila.",tags:["bonding","reentry","ex-offender","direct","hiring"]},
  {id:20,directBenefit:true,name:"NCCER — In-House Craft Training Credentials",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Trades",type:"Certification Infrastructure",level:"Industry",agency:"NCCER (National Center for Construction Education)",act:"DOL Office of Apprenticeship partner",maxBenefit:null,benefitUnit:"Standardized in-house curriculum + nationally portable credentials",calcMax:3000,valueBasis:"training cost savings",url:"https://www.nccer.org/about/become-a-sponsor",urlLabel:"NCCER Sponsoring Organization",eligibility:"Employers who become NCCER Sponsoring Organizations and deliver curriculum in-house. Sila could run NCCER modules as part of Sila University.",howToApply:"Register as a Sponsoring Organization at nccer.org. Purchase curriculum modules. Your in-house instructors deliver the training.",notes:"Sila becomes the training provider — NCCER provides the curriculum framework and credentialing. Technicians earn nationally recognized, portable credentials through your in-house program. Accelerates DOL apprenticeship registration and does not require sending techs to an outside school.",tags:["NCCER","in-house","credential","Sila University","curriculum"]},
  {id:23,directBenefit:true,name:"WANTO — Women in Apprenticeship Pipeline",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Trades",type:"Recruitment Pipeline",level:"Federal",agency:"DOL Women's Bureau",act:"WANTO Act",maxBenefit:null,benefitUnit:"Pre-screened female candidates for your in-house apprenticeship slots",calcMax:0,valueBasis:"pipeline only",url:"https://www.dol.gov/agencies/wb/grants/wanto",urlLabel:"DOL Women's Bureau",eligibility:"Employers with registered apprenticeship programs willing to host women apprentices. Community orgs funded by WANTO do all recruiting.",howToApply:"Partner with a current WANTO grantee in your state. Commit to apprenticeship slots. The grantee org does the recruiting and support work.",notes:"Expands your in-house apprenticeship talent pool. The community org recruits and supports candidates — Sila just provides the training slots and runs your standard in-house program.",tags:["women","pipeline","apprenticeship","in-house"]},
  {id:30,directBenefit:true,name:"Post-9/11 GI Bill (Ch. 33) — OJT & Apprenticeship",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Veterans",type:"Education Benefit",level:"Federal",agency:"VA / Department of Veterans Affairs",act:"Post-9/11 Veterans Educational Assistance Act (Chapter 33)",maxBenefit:2717,benefitUnit:"monthly housing allowance paid by VA directly to veteran apprentice",calcMax:32604,valueBasis:"per veteran/yr (12 mos × $2,717)",url:"https://www.va.gov/education/about-gi-bill-benefits/how-to-use-benefits/on-the-job-training-apprenticeships/",urlLabel:"VA OJT & Apprenticeship Guide",eligibility:"Veterans with 90+ days active service post-9/10/2001. Training happens at Sila under your in-house apprenticeship program. Employer must be VA-approved.",howToApply:"VA-approve your in-house apprenticeship at va.gov/education. Takes 4-6 weeks to set up. Veteran applies separately at va.gov.",notes:"VA pays the veteran $1,800–$2,717/month directly — on top of their Sila wage — while they train in-house at your facility. Employer pays NOTHING extra. Makes your in-house OJT wages stretch further, acting as a direct labor cost offset. The most powerful veteran recruiting tool in trades.",tags:["GI Bill","veteran","in-house","OJT","direct offset","housing allowance"]},
  {id:31,directBenefit:true,name:"VA Vocational Rehabilitation & Employment (Ch. 31)",states:["ALL"],trades:["ALL"],category:"Veterans",type:"Education Benefit",level:"Federal",agency:"VA / VR&E Service",act:"Vocational Rehabilitation and Employment (Chapter 31)",maxBenefit:null,benefitUnit:"VA pays ALL training costs + subsistence for disabled veteran training at your site",calcMax:15000,valueBasis:"per disabled veteran",url:"https://www.va.gov/careers-employment/vocational-rehabilitation/",urlLabel:"VA VR&E Program",eligibility:"Veterans with service-connected disability rating of 20%+. Training is conducted at Sila's facility as OJT/apprenticeship.",howToApply:"Work with VA VR&E counselors to develop OJT plans. Employer submits job description and in-house training outline.",notes:"VA pays ALL training costs AND provides monthly subsistence allowance to the veteran while they train in-house at Sila. Zero cost to Sila. VA covers what would otherwise be your training budget for that individual.",tags:["veteran","VR&E","in-house","direct offset","training costs covered"]},
  {id:32,directBenefit:true,name:"DOD SkillBridge — Active Duty to Trades",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Veterans",type:"Free Labor Pipeline",level:"Federal",agency:"Department of Defense",act:"National Defense Authorization Act (NDAA)",maxBenefit:null,benefitUnit:"DOD pays full military salary while they train at your facility — employer cost $0",calcMax:42000,valueBasis:"per person (est. 6-mo military salary)",url:"https://skillbridge.defense.gov/Employers/Enrollment-Process.htm",urlLabel:"Register at skillbridge.defense.gov",eligibility:"Active duty service members within 180 days of separation. They train at Sila's facility for 4-6 months under your in-house program.",howToApply:"Register at skillbridge.defense.gov as employer. Post apprenticeship slots. Receive pre-screened candidates within 30-60 days.",notes:"DOD pays their full military salary for 4-6 months while they do in-house OJT at Sila. Employer labor cost: ZERO. You get a motivated, disciplined, technically trained apprentice at no labor cost. This is the single most direct labor cost offset available. Many convert to full-time hires.",tags:["SkillBridge","active duty","zero cost","in-house","direct offset","military"]},
  {id:33,directBenefit:true,name:"Helmets to Hardhats — Veteran Apprenticeship Pipeline",states:["ALL"],trades:["HVAC","Plumbing","Electrical"],category:"Veterans",type:"Recruitment Pipeline",level:"Non-Profit / Federal Partner",agency:"Center for Military Recruitment / DOL Partner",act:"DOL-supported",maxBenefit:null,benefitUnit:"Zero-cost pre-screened veteran candidates for your in-house apprenticeship",calcMax:2000,valueBasis:"recruitment cost savings",url:"https://helmetstohardhats.org/employers/",urlLabel:"Register at helmetstohardhats.org",eligibility:"Employers with registered apprenticeship programs in trades.",howToApply:"Register at helmetstohardhats.org. Post in-house apprenticeship slots. Access veteran candidate database.",notes:"Eliminates recruiting cost for your in-house apprenticeship program. Pre-screened veterans with Navy/Air Force mechanical MOSs map directly to HVAC and electrical work. They arrive at your shop with real technical foundations.",tags:["veteran","pipeline","in-house","recruitment","direct offset"]},
  {id:40,directBenefit:false,name:"Federal Pell Grant — CTE Programs",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Education",type:"Student Grant (External)",level:"Federal",agency:"Dept. of Education",act:"Higher Education Act; FAFSA Simplification Act 2023",maxBenefit:7395,benefitUnit:"per student per year (flows to student/school, not employer)",calcMax:0,valueBasis:"external — noted only",url:"https://studentaid.gov/understand-aid/types/grants/pell",urlLabel:"FAFSA at studentaid.gov",eligibility:"Students with financial need enrolled in eligible CTE programs at accredited institutions.",howToApply:"Students apply via FAFSA. Requires enrollment at a qualifying institution.",notes:"📌 EXTERNAL FUNDING — Noted for awareness. Pell Grant money flows to the student or their school, not to Sila. Included here because some candidates may self-fund pre-apprenticeship training via Pell before joining Sila, which can reduce your onboarding gap. Not a direct employer offset.",tags:["Pell","external","student","noted only"]},
  {id:41,directBenefit:false,name:"Carl D. Perkins CTE Act",states:["ALL"],trades:["HVAC","Plumbing","Electrical","ALL"],category:"Education",type:"Grant (External Institution)",level:"Federal",agency:"Dept. of Education",act:"Carl D. Perkins CTE Act (reauthorized 2018)",maxBenefit:null,benefitUnit:"Funds flow to educational institutions, not employers",calcMax:0,valueBasis:"external — noted only",url:"https://cte.ed.gov/legislation/perkins-v",urlLabel:"Perkins V at cte.ed.gov",eligibility:"Educational institutions. Employers can participate as advisory partners.",howToApply:"Engage as an employer advisory partner with a local community or technical college.",notes:"📌 EXTERNAL FUNDING — Noted for awareness. Perkins funds flow to schools, not directly to Sila. Listed because community colleges with Perkins funding can provide pre-trained pipeline candidates who arrive at Sila with baseline skills. Not a direct employer offset.",tags:["Perkins","CTE","external","noted only"]},

.url-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#6B9EC7;text-decoration:none;background:rgba(107,158,199,.1);border:1.5px solid rgba(107,158,199,.25);border-radius:7px;padding:7px 13px;transition:all .15s}
.url-btn:hover{background:rgba(107,158,199,.2);border-color:rgba(107,158,199,.5);color:#A0C8E4}

.ns-row{display:flex;gap:12px;padding:13px 14px;border-radius:9px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);text-decoration:none;transition:border .18s}
.ns-row:hover{border-color:rgba(107,158,199,.4)!important}
.lic-row{display:flex;gap:10px;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:6px;border:1px solid rgba(255,255,255,.06);align-items:flex-start}
.sug-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:background .12s}
.sug-item:hover{background:rgba(212,168,50,.08)}.sug-item:last-child{border-bottom:none}
.print-btn{display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#D4A832;background:rgba(212,168,50,.1);border:1.5px solid rgba(212,168,50,.35);border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .15s}
.print-btn:hover{background:rgba(212,168,50,.2);border-color:#D4A832}
@media print{.no-print{display:none!important}.print-only{display:block!important}}
`;

function App(){
  const[tab,setTab]=useState("programs");
  const[loc,setLoc]=useState("");
  const[brandSearch,setBrandSearch]=useState("");
  const[showSug,setShowSug]=useState(false);
  const[search,setSearch]=useState("");
  const[trade,setTrade]=useState("ALL");
  const[catF,setCatF]=useState("ALL");
  const[openId,setOpenId]=useState(null);
  const[eoOpen,setEoOpen]=useState(false);
  const[summOpen,setSummOpen]=useState(true);
  const[reqOpen,setReqOpen]=useState(true);
  const[licOpen,setLicOpen]=useState(true);
  const[showExternal,setShowExternal]=useState(false);
  const searchRef=useRef(null);
  // calc
  const[hires,setHires]=useState(5);
  const[wage,setWage]=useState(22);
  const[hrs,setHrs]=useState(40);
  const[weeks,setWeeks]=useState(8);
  const[wotcCat,setWotcCat]=useState(0);
  const[wotcPct,setWotcPct]=useState(40);
  const[ojt,setOjt]=useState(true);
  const[ojtP,setOjtP]=useState(50);
  const[iwt,setIwt]=useState(false);
  const[iwtC,setIwtC]=useState(2000);
  const[iwtP,setIwtP]=useState(50);
  const[appr,setAppr]=useState(true);
  const[stateC,setStateC]=useState(false);
  const[stateA,setStateA]=useState(2500);
  const[s127,setS127]=useState(false);
  const[s127A,setS127A]=useState(3000);
  const[txR,setTxR]=useState(25);

  const selectedLoc=useMemo(()=>SILA_LOCATIONS.find(l=>`${l.brand}|${l.state}`===loc),[loc]);
  const selectedState=selectedLoc?selectedLoc.state:null;
  const stateName=selectedState?STATE_NAMES[selectedState]:null;
  const stateLocations=useMemo(()=>selectedState?SILA_LOCATIONS.filter(l=>l.state===selectedState):[],[selectedState]);
  const totalStateEmp=stateLocations.reduce((a,l)=>a+(l.emp||0),0);
  const stateLicenses=selectedState?STATE_LICENSES[selectedState]:null;

  const suggestions=useMemo(()=>{
    if(brandSearch.length<2)return[];
    const q=brandSearch.toLowerCase();
    return SILA_LOCATIONS.filter(l=>l.brand.toLowerCase().includes(q)||l.city.toLowerCase().includes(q)||l.state.toLowerCase().includes(q)||(STATE_NAMES[l.state]||"").toLowerCase().includes(q)).slice(0,8);
  },[brandSearch]);

  const grouped=useMemo(()=>{
    const g={};
    SILA_LOCATIONS.forEach(l=>{if(!g[l.state])g[l.state]=[];g[l.state].push(l);});
    return g;
  },[]);

  useEffect(()=>{
    const h=e=>{if(searchRef.current&&!searchRef.current.contains(e.target))setShowSug(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const filterProg=p=>{
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()));
    const mt=trade==="ALL"||(trade==="Veterans"&&p.category==="Veterans")||p.trades.includes(trade)||p.trades.includes("ALL");
    const mc=catF==="ALL"||p.category===catF;
    const md=showExternal||p.directBenefit;
    return ms&&mt&&mc&&md;
  };

  const stateProgs=useMemo(()=>PROGRAMS.filter(p=>selectedState&&p.states.includes(selectedState)&&!p.states.includes("ALL")&&filterProg(p)),[selectedState,search,trade,catF,showExternal]);
  const fedProgs=useMemo(()=>PROGRAMS.filter(p=>p.states.includes("ALL")&&filterProg(p)).sort((a,b)=>{
    const r=p=>p.category==="Presidential"?0:p.category==="Veterans"?2:p.category==="Education"?9:1;
    return r(a)-r(b);
  }),[search,trade,catF,showExternal]);
  const allFiltered=useMemo(()=>{
    if(selectedState)return[...stateProgs,...fedProgs];
    return PROGRAMS.filter(filterProg).sort((a,b)=>{
      const r=p=>p.category==="Presidential"?0:p.states.includes("ALL")?2:1;
      return r(a)-r(b);
    });
  },[selectedState,stateProgs,fedProgs,search,trade,catF,showExternal]);

  const stateTotal=useMemo(()=>stateProgs.reduce((a,p)=>a+(p.calcMax||0),0),[stateProgs]);
  const fedTotal=useMemo(()=>fedProgs.reduce((a,p)=>a+(p.calcMax||0),0),[fedProgs]);
  const grandTotal=stateTotal+fedTotal;

  const annWage=wage*hrs*52,trnWages=wage*hrs*weeks;
  const wotcV=Math.min(WOTC_CATEGORIES[wotcCat].maxCredit,annWage*.4)*(hires*wotcPct/100);
  const ojtV=ojt?trnWages*(ojtP/100)*hires:0,iwtV=iwt?iwtC*(iwtP/100)*hires:0;
  const apprV=appr?2000*hires:0,stateV=stateC?stateA*hires:0;
  const s127V=s127?Math.min(s127A,5250)*hires*(txR/100):0;
  const calcTotal=wotcV+ojtV+iwtV+apprV+stateV+s127V;

  const handlePrint=()=>{
    if(!selectedLoc){alert("Please select a location first to generate a location-specific one-pager.");return;}
    const sp=PROGRAMS.filter(p=>p.states.includes(selectedState)&&!p.states.includes("ALL")&&p.directBenefit);
    const fp=PROGRAMS.filter(p=>p.states.includes("ALL")&&p.directBenefit&&p.calcMax>0);
    const stot=sp.reduce((a,p)=>a+(p.calcMax||0),0);
    const ftot=fp.reduce((a,p)=>a+(p.calcMax||0),0);
    const gt=stot+ftot;
    const lic=STATE_LICENSES[selectedState];
    const licHtml=lic?`<h2>🪪 Required Licenses — ${STATE_NAMES[selectedState]}</h2>
<p style="font-size:11px;color:#666;margin-bottom:6px">Verify current requirements with the relevant licensing authority before operating in a new jurisdiction.</p>
${selectedLoc.specialty.map(trade=>{
  const arr=[...(lic.all||[]),...(lic[trade]||[])];
  return arr.length?`<p style="font-size:11px;font-weight:700;color:#1a3a5c;margin:6px 0 3px">${trade}</p><ul style="padding-left:16px;margin:0">${arr.map(l=>`<li style="font-size:11px;margin-bottom:3px"><strong>${l.lic}</strong> — ${l.who==="Co"?"Company License":l.who==="Tech"?"Individual Tech":"Company + Individual"} — ${l.body}</li>`).join('')}</ul>`:''}).join('')}`:'';
    const html=`<!DOCTYPE html><html><head><title>Sila Training Incentives — ${selectedLoc.brand}</title>
<style>body{font-family:Arial,sans-serif;font-size:12px;color:#222;margin:18px;line-height:1.4}h1{font-size:17px;color:#1a3a5c;margin-bottom:3px}h2{font-size:12px;color:#1a3a5c;margin:14px 0 5px;border-bottom:1px solid #ccc;padding-bottom:2px;text-transform:uppercase;letter-spacing:.05em}table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px}th{background:#1a3a5c;color:white;padding:5px 7px;text-align:left}td{padding:5px 7px;border-bottom:1px solid #eee}tr:nth-child(even){background:#f8f8f8}.sub{font-weight:700;background:#e8f0f8}.grand{font-weight:800;font-size:13px;background:#1a3a5c;color:white}.note{font-size:10px;color:#888;margin-top:14px;border-top:1px solid #ddd;padding-top:7px}ol{padding-left:16px;margin:0}li{margin-bottom:4px;font-size:11px}a{color:#1a5c8a}@media print{body{margin:8px}}</style>
</head><body>
<h1>Sila Services — Training Incentives One-Pager</h1>
<div style="font-size:12px;color:#444;margin-bottom:12px"><strong>${selectedLoc.brand}</strong> · ${selectedLoc.city}, ${selectedLoc.state} · ${selectedLoc.specialty.join(", ")} · Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
${sp.length>0?`<h2>📍 ${STATE_NAMES[selectedState]} — State Programs (Direct Cost Offsets)</h2>
<table><tr><th>Program</th><th>Max Value</th><th>Basis</th><th>Start URL</th></tr>
${sp.map(p=>`<tr><td>${p.name}</td><td>$${p.calcMax.toLocaleString()}</td><td>${p.valueBasis}</td><td><a href="${p.url}">${(p.url||'').replace('https://','').split('/')[0]}</a></td></tr>`).join('')}
<tr class="sub"><td><strong>State Subtotal</strong></td><td><strong>$${stot.toLocaleString()}</strong></td><td colspan="2">Direct offsets to ${selectedLoc.brand}</td></tr></table>`:''}
<h2>🏛 Federal & National Programs (Direct Cost Offsets)</h2>
<table><tr><th>Program</th><th>Max Value</th><th>Basis</th><th>Start URL</th></tr>
${fp.map(p=>`<tr><td>${p.name}</td><td>$${p.calcMax.toLocaleString()}</td><td>${p.valueBasis}</td><td><a href="${p.url}">${(p.url||'').replace('https://','').split('/')[0]}</a></td></tr>`).join('')}
<tr class="sub"><td><strong>Federal Subtotal</strong></td><td><strong>$${ftot.toLocaleString()}</strong></td><td colspan="2">Direct offsets</td></tr></table>
<table><tr class="grand"><td><strong>TOTAL POTENTIAL DIRECT COST OFFSETS TO SILA</strong></td><td><strong>$${gt.toLocaleString()}</strong></td><td colspan="2">State + Federal combined</td></tr></table>
${licHtml}
<h2>✅ Top Actions — What To Do Next</h2>
<ol>${NEXT_STEPS.slice(0,5).map(s=>`<li><strong>${s.action}</strong> <em>(${s.priority})</em><br><a href="${s.url}">${s.url}</a></li>`).join('')}</ol>
<p class="note">Generated by Sila Services L&D Training Incentives Navigator · ${KB_LAST_UPDATED} · CONFIDENTIAL — INTERNAL USE ONLY<br>
Values represent maximum potential if all programs are pursued. Actual awards depend on eligibility. Verify requirements before relying on these figures.</p>
</body></html>`;
    const w=window.open('','_blank');
    w.document.write(html);w.document.close();
    setTimeout(()=>w.print(),500);
  };

  const SectionHeader=({icon,label,count,color,sub})=>(
    <div className="sec-header">
      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:color||"#D4A832",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:7}}>
        <span>{icon}</span>{label}<span style={{fontWeight:400,color:"#3A5060",fontSize:11}}>({count})</span>
      </div>
      {sub&&<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:sub.startsWith("Subtotal")?color:"#3A5060",marginLeft:2,whiteSpace:"nowrap",fontWeight:sub.startsWith("Subtotal")?700:400}}>{sub}</div>}
      <div className="sec-header-line"/>
    </div>
  );

  const ProgramCard=({p,isState})=>{
    const isOpen=openId===p.id;
    const tc=getTC(p.type);
    const isEO=p.category==="Presidential";
    const isVet=p.category==="Veterans";
    const isExt=!p.directBenefit;
    const cardBg=isExt?"rgba(60,80,65,.07)":isEO?"rgba(232,160,32,.07)":isState?"rgba(91,170,114,.06)":"rgba(255,255,255,.03)";
    const cardBorder=isExt?"1.5px solid rgba(90,112,96,.2)":isEO?"1.5px solid rgba(232,160,32,.38)":isState?"1.5px solid rgba(91,170,114,.28)":"1.5px solid rgba(255,255,255,.06)";
    return(
      <div className={`pc${isOpen?" xp":""}`} style={{background:cardBg,border:cardBorder,opacity:isExt?.8:1}} onClick={()=>setOpenId(isOpen?null:p.id)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:3,marginBottom:6}}>
              {isExt?<span className="badge ext-pill">📌 External — Noted Only</span>:<span className="badge direct-pill">✅ Direct Offset</span>}
              {isEO&&<span className="badge eo-pill">⚡ EO Priority</span>}
              {isState&&<span className="badge state-pill">📍 {selectedState}</span>}
              {isVet&&<span className="badge vet-pill">🎖 Veterans</span>}
              {!isState&&!isEO&&!isExt&&<span className="badge fed-pill">{p.level}</span>}
            </div>
            <div style={{fontSize:"clamp(13px,2vw,15px)",fontWeight:600,color:isExt?"#8AA090":"#F0E8D4",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{p.name}</div>
            <div style={{fontSize:11,color:isExt?"#3A5060":"#3A5C6A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{p.agency}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,paddingLeft:8}}>
            {p.directBenefit&&p.maxBenefit!=null&&typeof p.maxBenefit==="number"&&p.maxBenefit>100?(
              <><div style={{fontSize:18,fontWeight:800,color:isEO?"#D4A832":isState?"#5BAA72":isVet?"#78B5D8":tc,fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>${p.maxBenefit.toLocaleString()}</div>
              <div style={{fontSize:10,color:"#2A4050",maxWidth:90,textAlign:"right",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3,marginTop:2}}>{p.benefitUnit}</div></>
            ):isExt?(
              <div style={{fontSize:11,color:"#5A7060",fontFamily:"'DM Sans',sans-serif",maxWidth:80,textAlign:"right"}}>Not a direct offset</div>
            ):(
              <div style={{fontSize:11,color:"#4A6070",fontFamily:"'DM Sans',sans-serif",maxWidth:80,textAlign:"right",lineHeight:1.4}}>{p.benefitUnit}</div>
            )}
            <div style={{color:isExt?"#4A6070":"#D4A832",fontSize:10,marginTop:5,fontFamily:"'DM Sans',sans-serif"}}>{isOpen?"▲ close":"▼ details"}</div>
          </div>
        </div>
        {isOpen&&(
          <div style={{marginTop:13}} onClick={e=>e.stopPropagation()}>
            <hr className="divider"/>
            <div style={{display:"grid",gap:11}}>
              {p.act&&<div><div className="cn">Authorizing Legislation</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{p.act}</div></div>}
              <div><div className="cn">Eligibility</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.eligibility}</div></div>
              <div><div className="cn">How to Apply</div><div style={{fontSize:13,color:"#B0C4D0",fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>{p.howToApply}</div></div>
              <div style={{background:isExt?"rgba(60,80,65,.12)":isEO?"rgba(232,160,32,.08)":"rgba(212,168,50,.07)",border:`1px solid ${isExt?"rgba(90,112,96,.25)":isEO?"rgba(232,160,32,.22)":"rgba(212,168,50,.16)"}`,borderRadius:8,padding:"11px 14px"}}>
                <div className="cn" style={{color:isExt?"#6A8070":isEO?"#D4A832":"#A08030",marginBottom:4}}>{isExt?"📌 Why It's Listed":"💡 Strategy Note — In-House Cost Offset"}</div>
                <div style={{fontSize:13,color:isExt?"#8AA090":isEO?"#D4B870":"#C8BC80",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{p.notes}</div>
              </div>
              {p.url&&p.directBenefit&&(
                <div><div className="cn" style={{marginBottom:6}}>Start the Process</div>
                  <a href={p.url} target="_blank" rel="noopener noreferrer" className="url-btn" onClick={e=>e.stopPropagation()}>
                    🔗 {p.urlLabel||"Official Program Page"} ↗
                  </a>
                </div>
              )}
              {p.directBenefit&&p.calcMax>0&&(
                <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                  <div><div className="cn" style={{marginBottom:4}}>Included in Funding Summary</div>
                    <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:isState?"#5BAA72":"#C8A84B"}}>${p.calcMax.toLocaleString()} <span style={{fontWeight:400,color:"#4A6070",fontSize:11}}>{p.valueBasis}</span></span>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  };

  const LicenseRow=({l})=>(
    <div className="lic-row">
      <div style={{width:52,flexShrink:0}}>
        <span className="badge" style={{background:l.who==="Co"?"rgba(212,168,50,.12)":l.who==="Tech"?"rgba(107,158,199,.12)":"rgba(160,124,197,.12)",color:l.who==="Co"?"#D4A832":l.who==="Tech"?"#6B9EC7":"#A07CC5",border:"none",fontSize:9,padding:"2px 6px",margin:0}}>
          {l.who==="Co"?"COMPANY":l.who==="Tech"?"TECH":"BOTH"}
        </span>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,color:"#E0D8C8",fontFamily:"'DM Sans',sans-serif"}}>{l.lic}</div>
        <div style={{fontSize:11,color:"#4A6070",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>{l.body}</div>
        {l.note&&<div style={{fontSize:11,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",marginTop:2,lineHeight:1.5}}>{l.note}</div>}
      </div>
      {l.url&&<a href={l.url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#4A6A8A",textDecoration:"none",border:"1px solid rgba(107,158,199,.2)",borderRadius:5,padding:"3px 8px",whiteSpace:"nowrap",alignSelf:"flex-start",flexShrink:0}} onClick={e=>e.stopPropagation()}>Verify ↗</a>}
    </div>

  return(

          <div>
            <p style={{fontSize:11,letterSpacing:".17em",textTransform:"uppercase",color:"#D4A832",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>Sila Services · Learning &amp; Development</p>

          </div>
          <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {tab==="programs"&&<button className="print-btn" onClick={handlePrint}>🖨️ Print One-Pager</button>}
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:30,fontWeight:800,color:"#D4A832",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{PROGRAMS.filter(p=>p.directBenefit).length}</div>
                <div style={{fontSize:10,color:"#344A58",fontFamily:"'DM Sans',sans-serif"}}>direct offsets tracked</div>
              </div>
            </div>
            <div style={{background:"rgba(212,168,50,.09)",border:"1.5px solid rgba(212,168,50,.28)",borderRadius:100,padding:"3px 11px",display:"inline-flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#5BAA72",display:"inline-block"}}/>
              <span style={{fontSize:11,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>Updated {KB_LAST_UPDATED}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid rgba(212,168,50,.14)",marginTop:18,overflowX:"auto"}}>
          {[{id:"programs",label:"Programs"},{id:"calculator",label:"Calculator"},{id:"acts",label:"Legislation"},{id:"agencies",label:"Agencies"}].map(t=>(
            <button key={t.id} className={`tab-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px 60px"}}>
        {tab==="programs"&&(

              </div>
              <div ref={searchRef} style={{position:"relative",marginBottom:10}}>
                <input className="srch" placeholder="🔍  Type brand name, city, or state (e.g. Pittsburgh, Ohio, Dave's World...)" value={brandSearch}
                  onChange={e=>{setBrandSearch(e.target.value);setShowSug(true);if(!e.target.value){setLoc("");} }}
                  onFocus={()=>setShowSug(true)}
                />
                {showSug&&suggestions.length>0&&(
                  <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:200,background:"#0D1E30",border:"1.5px solid rgba(212,168,50,.4)",borderRadius:10,overflow:"hidden",boxShadow:"0 8px 30px rgba(0,0,0,.6)"}}>
                    {suggestions.map(l=>(
                      <div key={l.brand+l.state} className="sug-item" onClick={()=>{setLoc(`${l.brand}|${l.state}`);setBrandSearch(l.brand);setShowSug(false);}}>

                        <div style={{fontSize:11,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif"}}>{l.city}, {STATE_NAMES[l.state]} · {l.specialty.join(", ")}{l.emp?` · ${l.emp} employees`:""}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{position:"relative"}}>

                    <optgroup key={st} label={`── ${STATE_NAMES[st]||st} (${st}) ──`}>
                      {locs.map(l=><option key={l.brand+l.state} value={`${l.brand}|${l.state}`}>{l.brand} — {l.city}{l.emp?` · ${l.emp} emp`:""}</option>)}
                    </optgroup>
                  ))}
                </select>
                <span style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",color:"#D4A832",pointerEvents:"none",fontSize:13}}>▾</span>

              {selectedLoc&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(212,168,50,.15)",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>

                    <span style={{fontSize:13,color:"#5A7A8A",marginLeft:8,fontFamily:"'DM Sans',sans-serif"}}>{selectedLoc.city}, {selectedLoc.state}</span></div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {selectedLoc.specialty.map(s=><span key={s} className="badge" style={{background:"rgba(106,191,192,.12)",color:"#6ABFC0",border:"1px solid rgba(106,191,192,.25)"}}>{s}</span>)}
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

                </div>

            {selectedLoc&&stateLicenses&&(

                </div>

                    {stateLicenses.all&&stateLicenses.all.length>0&&(

                        <div className="cn" style={{marginBottom:7,color:"#5A7A8A"}}>All Trades</div>

                      </div>
                    )}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:16,paddingBottom:14}}>

                        if(!arr||arr.length===0)return null;
                        return(
                          <div key={trade}>
                            <div className="cn" style={{marginBottom:7,color:trade==="HVAC"?"#6ABFC0":trade==="Plumbing"?"#6B9EC7":"#A07CC5"}}>{trade==="HVAC"?"🌡️":trade==="Plumbing"?"🪠":"⚡"} {trade}</div>
                            {arr.map((l,i)=><LicenseRow key={i} l={l}/>)}

                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,flexWrap:"wrap"}}>
                    <span className="badge eo-pill">⚡ Active Executive Order</span>
                    <span style={{fontSize:12,color:"#8A6018",fontFamily:"'DM Sans',sans-serif"}}>April 23, 2025 · President Trump · Trades Priority</span>
                  </div>
                  <div className="serif" style={{fontSize:"clamp(14px,2.2vw,17px)",color:"#F5EED8",lineHeight:1.3}}>{PRESIDENTIAL_MANDATE.title}</div>

                </div>
                <div style={{color:"#D4A832",fontSize:17,flexShrink:0}}>{eoOpen?"▲":"▼"}</div>
              </div>
              {eoOpen&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(232,160,32,.2)"}} onClick={e=>e.stopPropagation()}>

                    <div><div className="cn" style={{color:"#C8A040",marginBottom:7}}>Key Directives</div>
                      {PRESIDENTIAL_MANDATE.keyDirectives.map((d,i)=>(
                        <div key={i} style={{display:"flex",gap:7,alignItems:"flex-start",marginBottom:5}}>
                          <span style={{color:"#D4A832",fontSize:10,marginTop:3,flexShrink:0}}>→</span>
                          <span style={{fontSize:12,color:"#C0A058",lineHeight:1.65,fontFamily:"'DM Sans',sans-serif"}}>{d}</span>
                        </div>
                      ))}
                    </div>
                    <div><div className="cn" style={{color:"#C8A040",marginBottom:5}}>Opportunity for Sila</div>
                      <div style={{fontSize:13,color:"#D4B870",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif",marginBottom:10}}>{PRESIDENTIAL_MANDATE.silaOpportunity}</div>
                      <div className="cn" style={{color:"#C8A040",marginBottom:3}}>Watch For</div>
                      <div style={{fontSize:12,color:"#A08040",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{PRESIDENTIAL_MANDATE.watchFor}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Filter row */}
            <div style={{marginBottom:13}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9,flexWrap:"wrap",gap:8}}>
                <div className="scroll-x" style={{flex:1}}>
                  {TRADE_FILTERS.map(f=><button key={f.key} className={`tf-pill${trade===f.key?" on":""}`} onClick={()=>setTrade(f.key)}><span>{f.icon}</span>{f.label}</button>)}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <button className={`tgl ${showExternal?"on":"off"}`} onClick={()=>setShowExternal(!showExternal)}/>
                  <span style={{fontSize:12,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>Show external (noted only)</span>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 210px"}}><input className="srch" placeholder="Search programs, certifications, agencies…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
                <select className="fsel" value={catF} onChange={e=>setCatF(e.target.value)}>
                  <option value="ALL">All Categories</option>
                  {Object.entries(CAT_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>
            <div style={{fontSize:11,color:"#2A4050",marginBottom:11,fontFamily:"'DM Sans',sans-serif"}}>

            </div>

            {/* Programs list */}
            {selectedState?(
              <>
                {stateProgs.length>0&&<><SectionHeader icon="📍" label={`${stateName} Direct Offsets`} count={stateProgs.filter(p=>p.directBenefit).length} color="#5BAA72" sub={`Subtotal: ${fmt(stateTotal)}`}/>{stateProgs.map(p=><ProgramCard key={p.id} p={p} isState={true}/>)}</>}
                {fedProgs.length>0&&<><SectionHeader icon="🏛" label="Federal & National Direct Offsets" count={fedProgs.filter(p=>p.directBenefit).length} color="#6B9EC7" sub={`Subtotal: ${fmt(fedTotal)}`}/>{fedProgs.map(p=><ProgramCard key={p.id} p={p} isState={false}/>)}</>}
              </>
            ):(
              allFiltered.map(p=><ProgramCard key={p.id} p={p} isState={false}/>)
            )}
            {allFiltered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}><div style={{fontSize:28,marginBottom:10}}>🔍</div><div>No programs match. Try broadening filters or clearing search.</div></div>}

            {/* Funding Summary */}
            {selectedState&&(
              <div style={{marginTop:26,background:"rgba(212,168,50,.04)",border:"2px solid rgba(212,168,50,.25)",borderRadius:14,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",background:"rgba(212,168,50,.08)",cursor:"pointer",borderBottom:"1px solid rgba(212,168,50,.18)"}} onClick={()=>setSummOpen(!summOpen)}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:18}}>💰</span>
                    <div><div className="serif" style={{fontSize:16,color:"#D4A832"}}>Direct Cost Offset Summary — {stateName}</div>
                      <div style={{fontSize:12,color:"#7A8A9A",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>Potential direct offsets to Sila if all applicable programs are pursued</div></div>
                  </div>
                  <div style={{color:"#D4A832",fontSize:16}}>{summOpen?"▲":"▼"}</div>
                </div>
                {summOpen&&(
                  <div style={{padding:"4px 0"}}>
                    {stateProgs.filter(p=>p.directBenefit).length>0&&(
                      <><div style={{padding:"10px 18px 4px",display:"flex",alignItems:"center",gap:7}}>
                        <span className="state-pill" style={{fontSize:10}}>📍 {selectedState}</span>
                        <span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>State Programs — Direct Offsets</span>
                      </div>
                      {stateProgs.filter(p=>p.directBenefit).map(p=>(
                        <div key={p.id} className="sum-row">
                          <div style={{flex:1}}><div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{p.name}</div>
                            <div style={{fontSize:10,color:"#3A5060",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>{p.valueBasis}</div></div>
                          <div style={{textAlign:"right",paddingLeft:12}}>
                            <div style={{fontWeight:700,color:"#5BAA72",fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>{fmt(p.calcMax)}</div>
                            {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#3A5A6A",fontFamily:"'DM Sans',sans-serif",textDecoration:"none"}}>Start →</a>}
                          </div>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px",background:"rgba(91,170,114,.1)",borderTop:"1px solid rgba(91,170,114,.2)"}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#5BAA72",fontFamily:"'DM Sans',sans-serif"}}>📍 {stateName} Subtotal</span>
                        <span style={{fontSize:20,fontWeight:900,color:"#5BAA72",fontFamily:"'DM Sans',sans-serif"}}>{fmt(stateTotal)}</span>
                      </div></>
                    )}
                    {fedProgs.filter(p=>p.directBenefit&&p.calcMax>0).length>0&&(
                      <><div style={{padding:"10px 18px 4px",display:"flex",alignItems:"center",gap:7}}>
                        <span className="badge fed-pill" style={{fontSize:10,margin:0}}>🏛 Federal</span>
                        <span style={{fontSize:11,color:"#3A5060",fontFamily:"'DM Sans',sans-serif"}}>Direct Offsets</span>
                      </div>
                      {fedProgs.filter(p=>p.directBenefit&&p.calcMax>0).map(p=>(
                        <div key={p.id} className="sum-row">
                          <div style={{flex:1}}><div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{p.name}</div>
                            <div style={{fontSize:10,color:"#3A5060",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>{p.valueBasis}</div></div>
                          <div style={{textAlign:"right",paddingLeft:12}}>
                            <div style={{fontWeight:700,color:"#6B9EC7",fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>{fmt(p.calcMax)}</div>
                            {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#3A5A6A",fontFamily:"'DM Sans',sans-serif",textDecoration:"none"}}>Start →</a>}
                          </div>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px",background:"rgba(107,158,199,.1)",borderTop:"1px solid rgba(107,158,199,.2)"}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#6B9EC7",fontFamily:"'DM Sans',sans-serif"}}>🏛 Federal Subtotal</span>
                        <span style={{fontSize:20,fontWeight:900,color:"#6B9EC7",fontFamily:"'DM Sans',sans-serif"}}>{fmt(fedTotal)}</span>
                      </div></>
                    )}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",background:"linear-gradient(135deg,rgba(212,168,50,.15),rgba(212,168,50,.05))",borderTop:"2px solid rgba(212,168,50,.3)"}}>
                      <div>
                        <div className="serif" style={{fontSize:16,color:"#D4A832"}}>Total Direct Cost Offsets to Sila</div>
                        <div style={{fontSize:11,color:"#7A8A70",fontFamily:"'DM Sans',sans-serif",marginTop:2}}>Theoretical maximum · Per-program caps or typical values · Actual awards depend on eligibility</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,paddingLeft:16}}>
                        <div style={{fontSize:"clamp(26px,4vw,36px)",fontWeight:900,color:"#D4A832",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{fmt(grandTotal)}</div>
                        <div style={{fontSize:11,color:"#7A8A70",fontFamily:"'DM Sans',sans-serif"}}>State + Federal</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Requirements & Next Steps */}
            <div style={{marginTop:18,border:"1.5px solid rgba(212,168,50,.18)",borderRadius:14,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",background:"rgba(212,168,50,.06)",cursor:"pointer",borderBottom:reqOpen?"1px solid rgba(212,168,50,.14)":"none"}} onClick={()=>setReqOpen(!reqOpen)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>📋</span>
                  <div><div className="serif" style={{fontSize:16,color:"#D4A832"}}>Requirements &amp; What To Do Next</div>
                    <div style={{fontSize:12,color:"#7A8A9A",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>Common eligibility requirements across programs · Prioritized action sequence</div></div>
                </div>
                <div style={{color:"#D4A832",fontSize:16}}>{reqOpen?"▲":"▼"}</div>
              </div>
              {reqOpen&&(
                <div style={{padding:"18px 18px 4px"}}>
                  <div className="cn" style={{marginBottom:10}}>Common Eligibility Requirements (Across Most Programs)</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:8,marginBottom:20}}>
                    {BASIC_REQUIREMENTS.map((r,i)=>(
                      <div key={i} className="req-row">
                        <span style={{fontSize:20,flexShrink:0}}>{r.icon}</span>
                        <div><div style={{fontSize:13,fontWeight:600,color:"#E0D8C8",fontFamily:"'DM Sans',sans-serif",marginBottom:2}}>{r.req}</div>
                          <div style={{fontSize:11,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{r.detail}</div></div>
                      </div>
                    ))}
                  </div>
                  <div className="cn" style={{marginBottom:10}}>Prioritized Action Sequence{selectedState?` — ${stateName}`:""}</div>
                  {NEXT_STEPS.map((s,i)=>(
                    <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="ns-row" style={{borderColor:i===0?"rgba(212,168,50,.35)":i<2?"rgba(91,170,114,.25)":"rgba(255,255,255,.07)"}}>
                      <div style={{width:32,height:32,borderRadius:"50%",background:i===0?"rgba(212,168,50,.2)":i<2?"rgba(91,170,114,.15)":"rgba(107,158,199,.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:800,fontSize:13,color:i===0?"#D4A832":i<2?"#5BAA72":"#6B9EC7",fontFamily:"'DM Sans',sans-serif"}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#E0D8C8",fontFamily:"'DM Sans',sans-serif"}}>{s.action}</span>
                          <span className="badge" style={{background:s.priority==="This Week"?"rgba(212,168,50,.15)":s.priority==="This Month"?"rgba(91,170,114,.12)":"rgba(107,158,199,.1)",color:s.priority==="This Week"?"#D4A832":s.priority==="This Month"?"#5BAA72":"#6B9EC7",border:"none",margin:0,fontSize:9}}>{s.priority}</span>
                        </div>
                        <div style={{fontSize:12,color:"#5A7A8A",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}}>{s.detail}</div>
                        <div style={{fontSize:10,color:"#3A5A6A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>🔗 {s.url.replace("https://","")}</div>
                      </div>
                      <div style={{color:"#3A5A6A",fontSize:14,flexShrink:0,alignSelf:"center"}}>↗</div>
                    </a>
                  ))}
                  <div style={{paddingBottom:18}}/>
                </div>
              )}
            </div>
          </div>
        )}

        {/* CALCULATOR */}
        {tab==="calculator"&&(
          <div>
            {selectedLoc?<div style={{background:"rgba(91,170,114,.08)",border:"1.5px solid rgba(91,170,114,.25)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}><span>📍</span><span style={{fontSize:13,color:"#8BB5A0",fontFamily:"'DM Sans',sans-serif"}}>Calculating for <strong style={{color:"#F0E8D4"}}>{selectedLoc.brand}</strong> — {selectedLoc.city}, {selectedLoc.state} · In-house OJT program</span></div>
            :<div style={{background:"rgba(212,168,50,.06)",border:"1.5px solid rgba(212,168,50,.2)",borderRadius:9,padding:"10px 15px",marginBottom:16,display:"flex",gap:8}}><span>💡</span><span style={{fontSize:13,color:"#C0A870",fontFamily:"'DM Sans',sans-serif"}}>Select a location on the Programs tab for state-specific suggestions.</span></div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:20}}>
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>In-House Training Parameters</h2>
                <div className="crd">
                  <div style={{display:"grid",gap:12}}>
                    <div><div className="cn">Number of New Hires (In-House OJT)</div><input type="number" className="ci" value={hires} min={1} onChange={e=>setHires(Math.max(1,parseInt(e.target.value)||1))}/></div>
                    <div><div className="cn">Starting Hourly Wage ($)</div><input type="number" className="ci" value={wage} min={7.25} step={0.25} onChange={e=>setWage(parseFloat(e.target.value)||15)}/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div><div className="cn">Hours/Week</div><input type="number" className="ci" value={hrs} min={1} max={60} onChange={e=>setHrs(parseInt(e.target.value)||40)}/></div>
                      <div><div className="cn">OJT Training Weeks</div><input type="number" className="ci" value={weeks} min={1} onChange={e=>setWeeks(parseInt(e.target.value)||8)}/></div>
                    </div>
                    <div><div className="cn">Corp. Tax Rate (%)</div><input type="number" className="ci" value={txR} min={1} max={50} onChange={e=>setTxR(parseInt(e.target.value)||25)}/></div>
                  </div>
                  <div style={{fontSize:11,color:"#2A4050",marginTop:9,fontFamily:"'DM Sans',sans-serif"}}>OJT wages during training: ${(wage*hrs*weeks).toLocaleString()} · Annual wage: ${(wage*hrs*52).toLocaleString()}</div>
                </div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>WOTC Tax Credit</h2>
                <div className="crd">
                  <div style={{marginBottom:11}}><div className="cn">Hire Category</div>
                    <select className="csel" value={wotcCat} onChange={e=>setWotcCat(parseInt(e.target.value))}>
                      {WOTC_CATEGORIES.map((c,i)=><option key={i} value={i}>{c.label} (max ${c.maxCredit.toLocaleString()})</option>)}
                    </select>
                  </div>
                  <div><div className="cn">% of In-House Hires in This Category</div><input type="number" className="ci" value={wotcPct} min={0} max={100} onChange={e=>setWotcPct(parseInt(e.target.value)||0)}/></div>
                </div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Direct Offset Programs</h2>
                <div className="crd">
                  {[
                    {on:ojt,set:setOjt,label:"OJT Wage Reimbursement",sub:"50–75% of wages during in-house training",extra:ojt&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Reimbursement %</div><input type="number" className="ci" value={ojtP} min={0} max={75} onChange={e=>setOjtP(parseInt(e.target.value)||50)}/><div style={{fontSize:11,color:"#2A4050",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>Max 75% for smaller employers</div></div>},
                    {on:iwt,set:setIwt,label:"Incumbent Worker Training Grant",sub:"Reimburse in-house upskilling costs (NATE, EPA 608…)",extra:iwt&&<div style={{paddingLeft:52,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}><div><div className="cn">Training Cost/Employee ($)</div><input type="number" className="ci" value={iwtC} onChange={e=>setIwtC(parseInt(e.target.value)||0)}/></div><div><div className="cn">Reimbursement %</div><input type="number" className="ci" value={iwtP} min={0} max={90} onChange={e=>setIwtP(parseInt(e.target.value)||50)}/></div></div>},
                    {on:appr,set:setAppr,label:"Registered Apprenticeship Grant",sub:"~$2,000/apprentice federal base + state credits"},
                    {on:stateC,set:setStateC,label:`State Apprenticeship Credit${selectedState?" ("+selectedState+")":""}`,sub:"Enter your state credit below",extra:stateC&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">State Credit per Apprentice ($)</div><input type="number" className="ci" value={stateA} onChange={e=>setStateA(parseInt(e.target.value)||0)}/><div style={{fontSize:11,color:"#2A4050",marginTop:3,fontFamily:"'DM Sans',sans-serif"}}>PA: $2,500 · NY: $5,000 · NJ: $5,000 · IL: $2,500</div></div>},
                    {on:s127,set:setS127,label:"§127 In-House Training Tax Savings",sub:"Tax-free NATE/EPA 608/Sila University up to $5,250/yr",extra:s127&&<div style={{paddingLeft:52,marginBottom:10}}><div className="cn">Annual Training Benefit/Employee (max $5,250)</div><input type="number" className="ci" value={s127A} min={0} max={5250} onChange={e=>setS127A(Math.min(5250,parseInt(e.target.value)||0))}/></div>}
                  ].map(({on,set,label,sub,extra},i)=>(
                    <div key={i} style={{marginBottom:extra?0:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:6}}>
                        <button className={`tgl ${on?"on":"off"}`} onClick={()=>set(!on)}/>
                        <div><div style={{fontSize:13,fontWeight:600,color:"#D0D8E0",fontFamily:"'DM Sans',sans-serif"}}>{label}</div><div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{sub}</div></div>
                      </div>{extra}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h2 className="serif" style={{fontSize:18,color:"#D4A832",marginBottom:13}}>Estimated Direct Savings</h2>
                <div style={{background:"linear-gradient(135deg,rgba(212,168,50,.18),rgba(212,168,50,.06))",border:"2.5px solid #D4A832",borderRadius:15,padding:"24px 20px",textAlign:"center",marginBottom:15}}>
                  <div className="cn" style={{marginBottom:7}}>Total Direct Cost Offset to Sila</div>
                  <div style={{fontSize:"clamp(38px,7vw,56px)",fontWeight:900,color:"#D4A832",letterSpacing:"-.02em",lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{fmt(calcTotal)}</div>
                  <div style={{fontSize:12,color:"#5A7A8A",marginTop:6,fontFamily:"'DM Sans',sans-serif"}}>across {hires} in-house hire{hires!==1?"s":""}</div>
                  {hires>0&&<div style={{fontSize:16,color:"#C0D0DC",marginTop:8,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{fmt(calcTotal/hires)} avg per hire</div>}
                </div>
                <div className="crd">
                  <div className="cn" style={{marginBottom:11}}>Breakdown</div>
                  {[{l:"WOTC Tax Credit",sub:`${wotcPct}% · ${WOTC_CATEGORIES[wotcCat].label.split("(")[0].trim()}`,v:wotcV,c:"#D4A832"},
                    ojt?{l:"OJT Wage Reimbursement",sub:`${ojtP}% × ${weeks} wks × ${hires}`,v:ojtV,c:"#6B9EC7"}:null,
                    iwt?{l:"Incumbent Worker Training",sub:`${iwtP}% of $${iwtC.toLocaleString()} × ${hires}`,v:iwtV,c:"#A07CC5"}:null,
                    appr?{l:"Apprenticeship Grant",sub:`$2,000 × ${hires}`,v:apprV,c:"#5BAA72"}:null,
                    stateC?{l:`State Credit${selectedState?" ("+selectedState+")":""}`,sub:`$${stateA.toLocaleString()} × ${hires}`,v:stateV,c:"#5BAA72"}:null,
                    s127?{l:"§127 In-House Tax Savings",sub:`${txR}% × $${Math.min(s127A,5250).toLocaleString()} × ${hires}`,v:s127V,c:"#8BB5A0"}:null
                  ].filter(Boolean).map((r,i)=>(
                    <div key={i} className="rr">
                      <div><div style={{fontSize:13,color:"#C0D0DC",fontFamily:"'DM Sans',sans-serif"}}>{r.l}</div><div style={{fontSize:11,color:"#2A4050",fontFamily:"'DM Sans',sans-serif"}}>{r.sub}</div></div>
                      <div style={{fontWeight:800,color:r.c,fontSize:15,fontFamily:"'DM Sans',sans-serif"}}>{fmt(r.v)}</div>
                    </div>
                  ))}
                  <div style={{borderTop:"2px solid rgba(212,168,50,.22)",marginTop:5,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
                    <div style={{fontWeight:600,fontSize:14,color:"#E2D9C5",fontFamily:"'DM Sans',sans-serif"}}>Total</div>
                    <div style={{fontSize:24,fontWeight:900,color:"#D4A832",fontFamily:"'DM Sans',sans-serif"}}>{fmt(calcTotal)}</div>
                  </div>
                </div>
                <div style={{background:"rgba(120,181,216,.07)",border:"1.5px solid rgba(120,181,216,.2)",borderRadius:9,padding:14,marginBottom:11}}>
                  <div className="cn" style={{color:"#78B5D8",marginBottom:5}}>🎖 GI Bill + SkillBridge (not in calculator above)</div>
                  <div style={{fontSize:12,color:"#6A8AA0",lineHeight:1.75,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
                    <strong style={{color:"#C0D0DC"}}>GI Bill OJT:</strong> VA pays veteran $1,800–$2,717/mo on top of Sila wage while training in-house. Employer cost: $0.<br/>
                    <strong style={{color:"#C0D0DC"}}>SkillBridge:</strong> DOD pays active-duty member's salary during 4-6 month in-house apprenticeship. Employer cost: <strong style={{color:"#5BAA72"}}>$0</strong>.
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <a href="https://www.va.gov/education/about-gi-bill-benefits/how-to-use-benefits/on-the-job-training-apprenticeships/" target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>GI Bill OJT Approval ↗</a>
                    <a href="https://skillbridge.defense.gov/Employers/Enrollment-Process.htm" target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>SkillBridge Register ↗</a>
                  </div>
                </div>
                <div style={{background:"rgba(91,170,114,.06)",border:"1.5px solid rgba(91,170,114,.18)",borderRadius:9,padding:12}}>
                  <div style={{fontSize:11,color:"#5A7A6A",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}><strong style={{color:"#5BAA72"}}>⚠ Planning Estimate Only.</strong> Verify with a workforce development specialist or CPA before relying on figures.</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* LEGISLATION */}
        {tab==="acts"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Federal legislation and executive orders authorizing direct employer workforce training incentives for trades employers.</p>
            {[{name:"E.O. 'Preparing Americans for High-Paying Skilled Trade Jobs of the Future'",year:2025,scope:"Directs DOL/DOC/DOE to reach 1 million new apprentices; trades apprenticeship priority; reduce regulatory barriers; leverage Pell for CTE. Signed April 23, 2025.",agency:"DOL/DOC/DOE",highlight:true,url:"https://www.whitehouse.gov/presidential-actions/2025/04/preparing-americans-for-high-paying-skilled-trade-jobs-of-the-future/"},
              {name:"Workforce Innovation and Opportunity Act (WIOA)",year:2014,scope:"Core federal law funding OJT wage reimbursement, Incumbent Worker Training, and apprenticeship programs through local WDBs.",agency:"DOL/ETA",url:"https://www.dol.gov/agencies/eta/wioa"},
              {name:"National Apprenticeship Act",year:1937,scope:"Authorizes DOL to register employer-run apprenticeship programs. Processing streamlined under Trump EO.",agency:"DOL",url:"https://www.apprenticeship.gov"},
              {name:"Consolidated Appropriations Act (WOTC extension)",year:2021,scope:"Extended Work Opportunity Tax Credit through December 31, 2025. File Form 8850 within 28 days of each qualifying hire.",agency:"IRS/DOL",url:"https://www.dol.gov/agencies/eta/wotc"},
              {name:"Inflation Reduction Act (IRA)",year:2022,scope:"Clean energy credits with +10% bonus for prevailing wage + registered in-house apprenticeship compliance. Direct relevance for HVAC heat pump installers.",agency:"DOE/IRS",url:"https://www.energy.gov/lpo/inflation-reduction-act-2022"},
              {name:"National Defense Authorization Act — SkillBridge",year:"Annual",scope:"Active duty service members train at employer facilities for 4-6 months. DOD pays full military salary. Employer cost: $0.",agency:"DOD",url:"https://skillbridge.defense.gov"},
              {name:"Post-9/11 GI Bill (Chapter 33)",year:2008,scope:"VA pays Monthly Housing Allowance ($1,800–$2,717/month) directly to veteran apprentice during in-house OJT at employer's facility. Employer pays nothing extra.",agency:"VA",url:"https://www.va.gov/education/about-gi-bill-benefits/how-to-use-benefits/on-the-job-training-apprenticeships/"},
            ].map((a,i)=>(
              <div key={i} className="act-card" style={{borderLeft:`3.5px solid ${a.highlight?"#E8A020":"#D4A832"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:600,color:"#F0E8D4",fontFamily:"'DM Sans',sans-serif",lineHeight:1.3}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#2A4050",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{typeof a.year==="number"?`Enacted ${a.year}`:`Updated ${a.year}`} · {a.agency}</div>
                  </div>
                  {a.highlight?<span className="badge eo-pill">⚡ Active Priority</span>:<span className="badge" style={{background:"rgba(212,168,50,.1)",color:"#D4A832",border:"1px solid rgba(212,168,50,.25)"}}>{a.year}</span>}
                </div>
                <div style={{fontSize:13,color:"#7A9AB0",lineHeight:1.72,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>{a.scope}</div>
                <a href={a.url} target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 11px"}}>🔗 Official Source ↗</a>
              </div>
            ))}
          </div>
        )}

        {/* AGENCIES */}
        {tab==="agencies"&&(
          <div>
            <p style={{fontSize:13,color:"#4A6A7A",marginBottom:18,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>Agencies administering direct employer training incentives for trades. Each is a funder, partner, or compliance authority for your in-house programs.</p>
            {AGENCIES.map((a,i)=>(
              <div key={i} className="ag-card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:7}}>
                  <div><div style={{fontSize:14,fontWeight:600,color:"#F0E8D4",fontFamily:"'DM Sans',sans-serif"}}>{a.name}</div>
                    <div style={{fontSize:11,color:"#D4A832",marginTop:1,fontFamily:"'DM Sans',sans-serif"}}>{a.dept}</div></div>
                  <a href={a.url} target="_blank" rel="noopener noreferrer" className="url-btn" style={{fontSize:11,padding:"5px 10px"}}>🔗 {a.url.replace("https://","").split("/")[0]} ↗</a>
                </div>
                <div style={{fontSize:13,color:"#6A8AAA",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif"}}>{a.role}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{textAlign:"center",padding:"13px 16px 26px",borderTop:"1px solid rgba(212,168,50,.08)"}}>
        <div style={{fontSize:10,color:"#1A2E3A",letterSpacing:".08em",fontFamily:"'DM Sans',sans-serif"}}>SILA SERVICES · L&amp;D TRAINING INCENTIVES NAVIGATOR · {KB_LAST_UPDATED} · CONFIDENTIAL — INTERNAL USE ONLY</div>
        <div style={{fontSize:10,color:"#1A2E3A",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{SILA_LOCATIONS.length} brands · 15 states · {PROGRAMS.filter(p=>p.directBenefit).length} direct offsets + {PROGRAMS.filter(p=>!p.directBenefit).length} noted external · Goldman Sachs Alternatives PE</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
